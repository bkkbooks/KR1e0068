body:
  text: 春秋左氏傳補注春秋類提要臣等謹案春秋左氏傳補注十卷元趙汸撰汸尊黃澤之說春秋以左氏傳為主注則宗杜預左有所不及者以公羊榖梁二傳通之杜所不及者以陳傳良左傳章㫖通之是書即采傅良之說以補左傳集解所未及其大㫖謂杜偏於左傅良偏於榖梁若用陳之長以補杜之短用公榖之是以救左傳之非則兩者兼得筆削義例觸類貫通傳注得失辨釋悉當不獨有補於杜解為功於左傳即聖人不言之㫖亦灼然可見蓋亦春秋家持平之論也至杜預釋例自孔頴達散入疏文久無單行之本今從永樂大典裒輯始復為完書陳傅良之章㫖世尤罕覩汸所採録略存梗概固考古所亟取矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋左氏傳補注原序春秋魯史記事之書也聖人就加筆削以寓其撥亂之權惟孟子為能識其意故曰其事則齊桓晉文其文則史其義則孔子曰竊取之矣此三者述作之源委也自三傳失其㫖而春秋之義不明左氏於二百四十二年事變略具始終而赴告之情策書之體亦一二有見焉則其事與文庶乎有考矣其失在不知以筆削見義公羊穀梁以書不書發義不可謂無所受者然不知其文之則史也夫得其事究其文而義有不通者有之未有不得其事不究其文而能通其義者也故三傳得失雖殊而學春秋者必自左氏始然自唐啖趙以來說者莫不曰兼取三傳而於左氏取舍尤詳則宜有所發明矣而春秋之義愈晦何也凡春秋之作以諸侯無王大夫無君也故上不可論於三代盛時而下與秦漢以來舉天下制於一人者亦異其禮失樂流陵夷漸靡之故皆不可以後世一切之法繩之而近代說者類皆槩以後世之事則其取諸左氏者亦疏矣况其說經大㫖不出二途曰褒貶曰實録而已然尚褒貶者文苛例密出入無凖既非所以論聖人其以為實録者僅史氏之事亦豈所以言春秋哉是以為說雖多而家異人殊其失視三傳滋甚蓋未有能因孟子之言而反求之者至資中黃先生之教乃謂春秋有魯史書法有聖人書法必先考史法而後聖人之法可求若其本原脈絡則盡在左傳蓋因孟子之言而致其思亦已精矣汸自始受學則取左氏傳注諸書伏而讀之數年然後知魯史舊章猶賴左氏存其梗槩既又反覆乎二傳出入乎百家者又十餘年又知三傳而後說春秋者惟杜元凱陳君舉為有據依然杜氏序所著書自知不能錯綜經文以盡其變則其專修左氏傳以釋經乃姑以盡一家之言陳氏通二傳於左氏以其所書證其所不書庶幾善求筆削之㫖然不知聖人之法與史法不同則猶未免於二傳之蔽也嗚呼使非先生積思通微因先哲之言以悟不傳之祕學者亦將何所置力乎第左氏傳經唐宋諸儒詆毁之餘幾無一言可信欲人潛心於此而無惑難矣間嘗究其得失且取陳氏章指附於杜注之下去兩短集兩長而補其所不及庶幾史文經義互見端緒有志者得由是以窺見聖人述作之原凡傳所序事多列國簡牘之遺名卿才大夫良史所記其微辭奧㫖注有未備者頗采孔氏疏暢而通之諸牽合猥陋有不逃後儒之議者亦具見其說以極夫是非之公焉若夫不得於經則致疑於傳務為一切之說以釋經而無所據依以持其說則豈杜氏陳氏比乎故三傳之外不可無辨證者惟二家他說固不暇及也新安趙汸序
