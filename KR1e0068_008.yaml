body:
  text: 春秋左氏傳補註卷八元趙汸撰昭公上元年告於荘共之廟而來孔氏曰文王世子曰五廟之孫祖廟未毁雖為庶人取妻必告鄭𤣥云告於君也亦既告君必須告廟君尊不主臣昏故圍自告也其敢愛豐氏之祧孔氏曰祭法云遠祖廟為祧公孫段是穆公之孫子豐之子其家惟有子豐之廟杜言遠祖廟者順傳文言之讀舊書加于牲上而已今按於此可見宋之盟晉楚所爭者歃血之先後而已此不歃血故史不書盟季武子伐莒取鄆不書季孫伐莒者莒人告於㑹叔孫豹㡬被戮晉趙孟固請於楚而後免故為内諱之義與僖十六年滅項不言師同杜説非吾又誰怨孔氏曰厯檢上世以來季孫出使不少於叔孫而云叔出季處從來乆者季孫世為上卿法當上卿守國次卿出使耳必須使上卿者上卿非不使也周有徐奄孔氏曰徐奄二國皆嬴姓世本文也服䖍云魯公所伐徐戎也按費誓云淮夷徐戎並興具五獻之籩豆於幕下孔氏曰聘禮卿聘饔餼五牢故卿皆五獻至春秋之時大國之卿乃得從卿禮若次國之卿依大國大夫之制唯三獻故杜此註云大國之卿五獻又昭六年傳註云大夫三獻是也禮終乃宴孔氏曰謂享禮既終即因而為宴不待異日也杜解享宴禮異所以得相因者以其殽爼同故也宣十六年傳云王享有體薦宴有折爼公當享卿當宴王室之禮也其實諸侯之待公卿禮亦當然以卿㑹公侯享宴皆折爼不體薦享宴爼同故得因行禮也子皮賦野有死麕之卒章厖以喻楚時諸侯惡公子圍故欲趙孟安徐馴弭之觀答賦之語可見杜説非矣禹之力也孔氏曰冠者首服之總名弁冕冠中之小别端委是身服言弁冕端委總舉冠衣而言非謂定公趙孟身所自衣也周禮司服於士服下云其齊服有𤣥端素端鄭𤣥云謂之端者取其正也衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫以上侈之服䖍云禮衣端正無殺故曰端文徳之衣尚褒長故曰委論語鄉黨非帷裳必殺之鄭康成云帷裳謂朝祭之服其制正幅如帷非帷裳者謂深衣削其幅縫齊倍要禮記深衣之制短不見膚長不被土然則朝祭之服當曵地服言是也鄭放游楚於呉不書非卿他倣此而蔡蔡叔孔氏曰説文云􅔁散之也從米殺聲然則􅔁為放散之義故訓為放也𨽻書改作已失本體寫者全類蔡字至有重為一蔡字重㸃以讀之者罪秦伯也陳氏曰義同陳黄申釋之者以襄二十年傳未盡君臣之義此之謂多矣劉氏曰出奔者勢不得以千乘行又一日之享取幣八反非朝夕可望皆不近事實蓋舊説秦伯以千乘之富不能容其母弟傳者不知則謂鍼以千乘出奔記者不辨又増取幣八反以什共車必克孔氏曰周禮十人為什以一什之人共一車之地故必克也偏為前拒孔氏曰五陳者即兩伍専參偏是也相離者布陳使相遠也服䖍引司馬法云五十乘為兩百二十乘為伍八十一乘為専二十九乘為參二十五乘為偏彼皆凖車數多少以為别名此傳去車用卒而有此名則此名不以車數為别也杜云皆臨時處置之名其意不同服説則名與人數不可得知也周禮則五人為伍二十五人為兩無専參偏之名也展輿奔呉陳氏曰傳見展輿踰年不稱子義同陳佗齊無知后帝不臧孔氏曰襄九年傳稱閼伯為陶唐氏之火正知后帝是堯也故辰為商星孔氏曰商謂宋也宋商後故稱商人以服事夏商孔氏曰二十九年傳云陶唐既衰其後有劉累累雖遷魯子孫仍在大夏故厯夏及商也劉炫云非累子孫則其同族等類耳故參為晉星孔氏曰晉世家云唐叔子燮是為晉侯杜譜亦云燮父改為晉侯則叔虞之身不稱晉也宣汾洮釋例曰汾水出太原故汾陽縣至河東汾隂縣入河其洮水闕不知所在當亦是晉地之水後世竭涸耳封諸汾川孔氏曰顓頊為帝承金天之後臺駘是金天裔孫為臣宜當顓頊故以帝用嘉之為顓頊嘉耳不容彈矣劉炫氏曰五降而息罷退者五聲一周聲下而息前聲罷退以待後聲非作樂息也孔氏曰罷退之後其曲已了不容更復彈作弗聴也劉炫氏曰此説降後不彈之意也縊而弑之孔氏曰若以為十二月己酉則六日己酉子干奔晉至晉猶見趙孟七日庚戌趙孟卒便是日相切迫無相見之理故知十一月為是己酉為誤甲辰朔烝于温劉炫氏曰晉烝及適南陽並在十二月之前文繫十二月者欲見烝後即行十二月之文為下甲辰朔起本舉月遙屬下明晉烝猶在朔前十二月非誤也庚戌卒陳氏曰傳終言趙孟之偷志不在伯故宋虢之盟楚駕於晉二年且告為政而來見禮也叔孫豹嘗以晉君失政欲樹於韓子使為魯備季孫不從今韓起為政當聘魯不使他人而身來亦欲親結魯好或疑傳妄過矣與周之所以王也傳見魯之策書乃周公遺制所謂魯春秋乃國史成書二傳不知此説故不得筆削本末執諸中都陳氏曰傳言所以不書執加木焉傳見子晳三罪子産不能以時討故經無異文三年大夫送葬子大叔所言文襄朝聘之制考之春秋惟魯事齊桓為合晉文以後經傳事迹皆不同蓋伯業有盛衰疏數隨時有過有不及終不可為定制也卿共葬事則襄公而後魯以卿㑹葬者三君傳於昭三十年又記大叔之言亦見不能常也而數於守適孔氏曰言夫人守内官之適長故以守適言夫人也文襄之制夫人喪士弔大夫送葬今游吉卿也而云同於守適則於時適夫人喪已令卿送葬矣及遺姑姊妹孔氏曰遺姑姊妹謂非夫人所生者也未有伉儷孔氏曰少姜本非正夫人而云未有伉儷者蓋晉侯當時無正夫人其繼室者使韓起上卿逆之鄭罕虎如晉賀之則後娶者為夫人也已在齊矣孔氏曰相訓為助今定本相作祖讒鼎之銘服䖍氏曰讒鼎疾讒之鼎明堂所云崇鼎是也一云讒地名禹鑄九鼎於甘讒之地故曰䜛鼎唯羊舌氏在而已孔氏曰世族譜云羊舌氏晉之公族也羊舌其所食邑名唯言晉之公族不知出何公也杜云同祖為宗謂同出一公有十一族也子豐有勞於晉國孔氏曰子豐有勞事無所見伯石再拜稽首受策以出傳見晉侯䇿命外大夫賜之以田僣天子之禮葬滕成公劉炫氏曰叔弓以四月發魯滕以五月葬君叔弓書始行之月滕書實葬之月故書經異文也傳述遇讎之事并就葬月言耳陳氏曰傳言滕所以始書葬敬子不入孔氏曰檀弓記此事云惠伯曰政也不可以叔父之私不將公事知懿伯是椒叔父也懿伯為人所殺及滕郊逢其讎叔弓不入者禮椒也為椒有辟仇之恥禮之欲使殺之敬子從之孔氏曰檀弓云子夏請問居昆弟之仇如之何曰仕不與共國衘君命而使雖遇之不鬬叔父之與昆弟親疎同爾辟仇非恥故椒請先入也吉庶㡬焉陳氏曰傳備載諸國弔賀事以見晉失諸侯之故罪之也傳見殺大夫有名有不名既以稱名為有罪國君出奔有名冇不名亦以稱名為罪之然衛侯鄭叛中國從夷狄其罪大矣而出奔不名燕大夫比以殺公之外嬖不出且見弑乃於其出奔而罪之失其類矣四年四嶽孔氏曰中嶽嵩髙即大室是也下别言之故此言四嶽三塗孔氏曰釋例土地名云三塗河南陸渾縣南山名或曰三塗伊闕大谷轘轅三道也傳曰晉將伐陸渾而先有事於洛與三塗先祭山川也謂三道皆非也何辱命焉傳見晉人中實畏難而文以不爭故以諸侯授楚莫匡其君傳見晉君懦臣貪無能為者故楚敢求其所從之諸侯西陸朝覿而出之孔氏曰覿見也西道之宿有星朝見者於是而出之衛侯辭以疾傳見東諸侯初無從楚之志宋華費遂鄭大夫從陳氏曰傳言從見華費遂送大司馬所以不書使屈申圍朱方陳氏曰為明年殺屈申起本王從之不言以歸説見襄十年故曰取陳氏曰傳釋取例按僖六年晉襲虞遂滅之執虞公傳曰書曰晉人執虞公罪虞且言易也則言易不但施於取傳凡四發取例皆以不書伐故曰易見襄十三年例非是作丘賦孔氏曰哀十一年傳注云丘賦之法囚其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦然則此與彼同賦歛家資使出牛馬又别賦其田使之出粟若今輸租更出馬一疋牛三頭是一丘出兩丘之稅按周禮有夫征家征夫征謂出税家征謂出車徒給徭役此牛馬之屬則周禮之家征也其夫征十一而税是與家征别今按傳記晉作州兵鄭作丘賦見加賦毒民不惟魯爾未際孔氏曰大夫將立適子必須接見同寮季武子立紇飲大夫酒是其事也孟丙未與大夫交際故為之作鐘因落鐘令與相見見仲而何孔氏曰大夫立子為適必自見之於君宣十四年申舟見犀而行定六年樂祁見溷而行是其事也孟孫為司空以書勲孔氏曰所以司徒書名者周禮大司徒掌十二教十有一曰以賢制爵十有二曰以庸制禄故司徒書名定位號也司馬與工正書服者周禮夏官司馬其屬有司士掌羣臣之政亦以徳詔爵以功詔禄工正雖不屬司馬掌作車服故與司馬書服也按周禮司勲屬夏官今司空書勲者春秋之時又是諸侯之法不可盡與禮同傳見魯三卿官猶舊制如晉宋皆改易周官矣五年卑公室也孔氏曰魯之軍名傳無其號晉作三軍為上中下則魯之三軍亦當然也分中軍之衆屬上下二軍其上下二軍依舊不動故云舍中軍也其廢中軍之後上下二軍分為四哀十一年齊師伐魯傳稱孟孺子泄帥右師冉求帥左師冉求季氏宰也又言叔孫退而蒐乘更無别稱知自以叔孫為軍名也季氏擇二孔氏曰季孫因叔孫家禍退之使同於孟孫獨取其半為專已甚又擇取善者是専之極故傳言擇二以見之而貢于公孔氏曰初作三軍季氏盡征之並不入公室也叔孫氏臣其子弟以一家之内有父兄子弟四品以父兄之税入公子弟之税入已大率半入公半入已孟氏則於子弟中取其半或取子或取弟大率三分歸公一分入已十二分其國民三家得七公得五國民不盡屬公今舍中軍四分公室三家自取其税減己税以貢於公國民不復屬於公公室彌益卑矣不可能也此非孔子之言也借令昭子未知竪牛餓殺其父但以殺適立庶為大罪孔子亦豈可但據其所言而善之傳舉細遺大又託之於聖人類如此晉侯送女于邢丘陳氏曰傳言晉卑事楚今按傳記齊請繼室于晉晉亦歸女于楚其後齊又女于呉齊晉皆伯國也於是皆衰至薦女以相結夷狄所以獨彊君子謂叔侯於是乎知禮陳氏曰傳言周衰文勝無益於治越大夫常壽過帥師㑹楚子于𤨏陳氏曰越常壽過始見書人今按夷狄舉號君臣同辭其臣從中國序列則稱人以便文陳氏得書人非呉人敗諸鵲岸陳氏曰楚一不書敗六年大夫如秦𦵏景公陳氏曰傳言秦所以始書葬因見卿㑹葬非禮懼民之有爭心也孔氏曰尚書吕刑五刑之屬三千周禮司刑掌五刑之法以麗萬民之罪皆是豫制刑矣而云臨事制刑不豫設法者聖王雖制刑法舉其大綱但共犯一法情有淺深或輕而難原或重而可恕雖依凖舊條而㫁有出入不豫設定法告示下民令不測淺深常畏而懼罪也今鄭鑄之於鼎以章示下民法既豫定民皆先知於是倚公法以展私情附輕刑而犯大惡是無所忌而起爭端也而徼幸成之孔氏曰法之設文有限民之犯罪無窮為法立文不能網羅諸罪民之所犯不必正與法同自然有危疑之理因此危文以生爭心將有實罪而獲免者也鑄刑書孔氏曰為其文是制參辟勒於鼎是鑄刑書吾以救世也孔氏曰當時鄭國大夫邑長蓋有㫁獄不平輕重失中故作此書以令之所以救當世也得貺不過三獻孔氏曰大行人云上公九獻侯伯七獻子男五獻獻各如其命數典命云公侯伯之卿皆三命知其當三獻也大夫卿之總名皆知其將為王也陳氏曰為十三年去疾得國起傳乃逆之傳見楚卑晉晉畏楚子蕩歸罪於薳洩而殺之陳氏曰楚再不書敗且弔敗也魯使卿弔敗則杜氏不告非事實矣逆諸河禮也孔氏曰世族譜以王正為雜人諸本及王肅董遇注皆作王正俗本或誤為士匄此人不當與士鞅之父同姓晉侯許之傳見晉衰諸侯復散七年齊求之也諸家從榖梁傳作魯暨齊平劉氏析左氏齊求魯平為一節癸巳以下為齊燕行成之事以合其説葢不察後文有齊燕平之語盟于濡上孔氏曰今按髙陽無此水也水源皆出於山其出平地皆是山中平地燕趙之界無泉出者未知杜言何所按據不克而還陳氏曰傳釋經書平罪齊無討燕之實且為十二年納欵起本為王旌以田孔氏曰凡九旗之帛皆用絳干首有羽羽為旌名遂以旌為旗稱禮緯稽命徵云禮天子旗九刅曵地諸侯七刅齊軫杜以楚雖僣號稱王未必即如天子故以諸侯解之言王旌游至於軫遂赦之陳氏曰傳載椒舉薳啟疆芋尹無宇之辭見楚所以能彊願與諸侯落之孔氏曰雜記云路寢成則考之而不釁考之者設盛食以落之杜言祭之為落者當祭中霤之神以安之公如楚陳氏曰傳言魯從楚之不得已也則自取謫于日月之災以分野論日食受災之國亦謬晉人為把取成不書説見襄二十九年昭定哀春秋非公命而書者多矣杜説非陳氏曰傳言季氏專不待公命余又將殺段也劉炫氏曰段即豐氏當言駟氏黨字之誤吾為之歸也何休膏肓曰孔子不語怪力亂神以鬼神為政必惑衆故不言也今左氏以此令後世廢仁義而祈福於鬼神此大亂之道也鄭𤣥答之曰伯有惡人也其死為厲鬼厲者隂陽之氣相乘不和之名尚書五行傳六厲是也人死體魄則降志氣在上有尚徳者附和氣而興利孟夏之月令雩祀百辟卿士有益于民者由此也為厲者因害氣而施災故謂之厲鬼月令民多厲疾五行傳有禦六厲之禮禮天子立七祀有大厲諸侯立五祀有國厲欲以安鬼神弭其害也余敢忘高圉亞圉陳氏曰傳言周衰諸侯多不待命而自立曰孔丘孔氏曰當言三十四而云五蓋相傳誤耳而滅於宋孔氏曰家語本姓篇云宋泯公熙生弗父何何生宋父周周生世子勝勝生正考父考父生孔父嘉其後以孔為氏也孔父生木金父金父生臯夷父夷父生防叔防叔避華氏之偪而奔魯生伯夏伯夏生梁紇梁紇即生孔子也殺獻公而立成公陳氏曰傳見兩下相殺雖王卿士不書嵗時日月星辰是謂也孔氏曰周禮馮相氏掌十有二嵗十有二月十有二辰十日二十有八星之位謂此六物也八年罪在招也陳氏曰嫌同衛鱄陳黄故别釋之將天下實賀陳氏曰傳見子産譏銅鞮師曠諷虒祁叔向亦云以見晉之不競歸罪於公子過而殺之歸罪於過者招也以討亂告故稱人與晉先都士縠同殺馬毁玉以葬陳氏曰於葬陳哀公見有魯不書㑹葬者於葬楚康王見有魯㑹不書葬者今按葬陳哀公以楚告而書不書楚葬避其僣號二者皆魯史變例使穿封戌為陳公陳氏曰傳言楚實利陳以討招為名侍飲酒於王傳見楚子稱師譏不在棄疾臣必致死禮以息楚國孔氏曰致死禮者欲為郟敖致死殺靈王也穿封戌既臣事靈王而為此悖言者以明在君為君之義此對是謟非悖也九年楚公子棄疾遷許于夷不書楚説在成十五年實城父孔氏曰杜以地名經傳不同而傳言實者則以為名有改易也傳不言實者則以為二名並存也所言實者皆舉舊以實新此地舊名城父此時新改為夷昭十八許遷于白羽傳云許遷于析實白羽定十年公㑹齊侯于夾谷傳云㑹于祝其實夾谷十三年齊侯衛侯次于垂葭傳云次于垂葭實郥氏此四者或經書未改或經書已改傳皆上句舉其已改之名下句實其未改之號吾西土也孔氏曰釋例土地云魏河東河北縣也芮馮翊臨晉縣芮鄉是也畢在京兆長安縣西北駘在武功歧在美陽今按其地芮在魏之西南百餘里耳岐在駘之西北無百里也詩稱后稷封邰計魏在邰東六百餘里公劉居豳又在岐西北四百餘里此傳極言遠境而辭不及豳其實自岐以西猶是周竟但不復重言之耳吾東土也服䖍氏曰蒲姑商奄濱東海者也蒲姑齊也商奄魯也二十年傳曰蒲姑氏因之定四年傳曰因商奄之民命以伯禽吾北土也孔氏曰土地名云巴巴郡江州縣也楚南郡江陵縣也建寧郡南有濮夷地然則巴楚鄧中夏之國唯濮為遠夷耳地名又云燕國薊縣也亳是小國闕不知所在葢與燕相近亦是中國也唯肅慎為遠夷魯語云武王克商肅慎氏貢楛矢晉之𤣥莬即在遼東東北晉人禮而歸之陳氏曰傳言周衰甚因見晉之無政故曰五十二年孔氏曰歴家以周天十二次次别為百四十四分嵗星每年行一百四十五分是嵗星行一次外剩行一分積一百四十四年乃剩行一次故昭十五年得超一辰今杜氏既無此義而三十二年嵗星得在丑者嵗星之行天之常數超辰之義不言自顯十年陳氏始大陳氏曰傳言欒髙之亡陳氏所以興始用人於亳社不書史諱國惡葬平公也傳記鄭伯往弔又因叔孫如晉併記十一國㑹葬大夫見晉雖失政諸侯猶畏其彊葢取諸史氏别志陳氏見傳文序列如釋經然誤以為有筆削非也外㑹葬法不得書其是之謂乎陳氏曰終上文髙彊事十一年僖子使助薳氏之簉孔氏曰禮有副車倅車皆謂副貳之車也簉亦副倅之意將焉用之陳氏曰傳見晉大夫自憂其不競晉人使狐父請蔡于楚弗許傳見晉人能合諸侯而畏楚憚戰故不能救蔡葉氏謂謀救蔡不果無貶辭疑傳妄胡氏乃謂心欲救蔡而力弗加則無惡有愧於苟呉矣葢不知昭公而後大夫有事悉從其恒稱㑹有表孔氏曰著定謂佇立定處㑹有表亦是位之定處但著下言定則表亦是定故直言㑹有表耳俗本謂表下有旗謬也野㑹設表為位亦當有物記處如今之位版也禮諸侯建旂設旂為表也覲禮諸侯覲于天子入壝門或左或右各就其旂而立是天子於野㑹諸侯設表以為位也盟主之㑹諸侯亦必以旂表位大夫聚㑹亦應有以表位但無文以見耳無守氣矣孔氏曰言無守身之氣將必死祖不歸也不為祖考所歸義何取於歸姓與外傳言宣王不藉千畆戰于千畆王師敗績之類相似當時自有一等迂繆之論左氏擇之不精耳楚子滅蔡陳氏曰傳言楚子書師于岡山孔氏曰此時楚以畜牲用之無人為之作謚必是蔡侯廬歸國乃追謚其父為隱耳釋例土地名岡山闕不知其處經言以歸用之必是楚地山也十二年因其衆也陳氏曰傳見北燕伯欵不名公子憖遂如晉不書本從公行事見後例在成十三年襄二十八年杜氏陳氏俱未考葬鄭簡公杜氏以此證其卒哭除喪之説非傳意後見昭十五年遂入昔陽孔氏曰劉炫謂肥鼓並在鉅鹿昔陽即是鼔都在鮮虞東南也二十二年傳云晉荀呉使師偽糴者負甲以息於昔陽之門外遂襲鼔滅之則昔陽之為鼔都㫁可知矣今杜以昔陽為肥國都是者以傳云遂入昔陽即云壬午滅肥是因入而滅之故云昔陽肥國都也昔陽既在樂平沾縣而杜又云鉅鹿下曲陽縣西南有肥累城相去遠者杜君土地例稱有者皆疑辭故云樂平沾縣東有昔陽是疑而不定但肥都昔陽與鼔相近晉既滅得肥國故二十二年息昔陽之門外遂襲鼔而取之昔陽非鼓都也以肥子緜皋歸不書併後伐鮮虞肥鼔皆白狄微種鮮虞之屬故十五年滅鼔亦不書殺甘悼公陳氏曰不書義同七年單獻公傳載甘單之禍皆所以起周亂以再命為卿孔氏曰悼子之卒不書於經則是未為卿也其卒當在武子之前平子以孫繼祖武子卒後即平子立也傳言悼子卒者欲見昭子為卿逺在平子之先更受三命孔氏曰十年平子伐莒名書於經即平子於時已為卿矣釋例曰魯之叔孫父兄再命而書於經晉司空亞旅一命而經不書推此知諸侯之卿大夫再命以上皆書於經自一命而下大夫及士經皆稱人名氏不得見也是杜檢傳文知再命書名平子伐莒書名知其已再命矣平子伐莒克之昭子不伐莒也昭子無功而更受三命知平子以功加三命昭子以例加為三命也以費叛如齊陳氏曰凡家臣叛但書圍不書叛後倣此傳中載竪牛南蒯之事見叔季皆有家禍魯無彊君二氏遂專遂奔齊孔氏曰凡言出奔皆自内而出文七年晉先蔑奔秦先在秦地因即奔秦故不言出也歸父還自晉至笙遂奔齊笙在魯之竟外故不言出也此言及郊已入魯竟傳言及郊解經所以書出曰吾不為怨府陳氏曰傳言魯三家本不同心圍徐以懼呉陳氏曰不書圍專足畏也劉炫氏曰楚語云靈王城陳蔡不羮問於范無宇曰今吾城三國賦皆千乘亦當晉矣諸侯其來乎對曰是三城者豈不使諸侯之惕焉彼再言三城無四國也葢占四字積畫四當為三而無醉飽之心孔氏曰言若用民力當隨其所能而制其形模依此形模用民之力而無有醉飽盈溢之心也醉飽者飲食饜足之名以王之遊行必勞損民力不知饜足故令依法用之十三年越大夫戮焉王肅氏曰越大夫常壽過也申之㑹經書淮夷而不書越者以常壽過有罪不得列㑹故不書越也戮者陳其罪惡以徇諸軍言將殺之終亦不殺過至今在楚故怨而作亂城而居之孔氏曰固城城之堅固者息舟即是其一以圍時有所毁故更城而居之及公子罷敵陳氏曰殺太子不書義同襄二十六年衛角公子比為王陳氏曰傳言棄疾實召之而蔽罪於比王縊于芋尹申亥氏孔氏曰傳既以五月統癸亥之日而乙夘丙辰亦是五月之日雖則言有顛倒即令蒙此五月之文也劉炫氏曰杜此注經書四月誤按上經注云靈王實以五月死楚人生失靈王本其始禍以赴兩注不同今按四月者比歸國之月也春秋之法凡大夫公子反國皆不月而弑君無不月者比歸而王弑故經沒死之月蒙上文比歸為一事見比以簒逆歸而特存其歸國之月以異之杜氏不知筆削之㫖故經傳異説實訾敖孔氏曰郟敖與此訾敖皆不成君無號謚也元年傳云葬王于郟謂之郟敖此云葬子干于訾實訾敖並以地名冠敖未知其故又世家楚之先君有若敖宵敖皆在位多年亦稱為敖不知敖是何義獲其五帥陳氏曰呉楚相敗皆不書至定四年始書之子産以幄幕九張行孔氏曰周禮幕人掌帷幕幄帟綬之事鄭𤣥云王出宫則有是事在旁曰帷在上曰幕皆以布為之四合象宫室曰幄帟王在幕若幄中坐上承塵幄帟皆以繒為之凡四物者以綬連繫焉然則幕大幄小幄在幕下張之幄幕九張葢九幄九幕也淫芻蕘者孔氏曰芻者飼牛馬之草也蕘者共燃火之草也説文云蕘薪也使諸侯嵗聘以志業孔氏曰嵗嵗使於天子所以獻其貢賦令諸國各自記其職貢之業間朝以講禮孔氏曰間朝者據聘為言也既云嵗聘因從聘嵗為始更間一年乃朝故知間朝是三年而一朝也以顯昭明叔向言朝聘之節大數與周禮不合葢東遷典籍散失士大夫亦無所折衷而使之從公侯之貢王肅氏曰鄭伯爵而連男言之猶言公侯足句辭也孔氏曰僖二十九年例云在禮卿不㑹公侯㑹伯子男可也是伯國下同子男也十四年尊晉罪已也大夫不書至降於君也必執然後書至重正卿也傳例非陳氏亦曲為之義司徒老祁慮癸孔氏曰世族譜司徒老祁為一人慮癸為一人服䖍云司徒姓也老祈字也慮癸亦姓字也杜以下句請於南蒯曰臣願受盟知是南蒯家臣蒲餘侯兹夫殺莒公子意恢陳氏曰傳見兹夫實殺意恢而書國郊公不書奔説在二十三年爭鄐田巫臣奔晉晉與之邢雍子奔晉晉與之鄐事在襄二十六年傳孔晁云邢與鄐爭疆界與叔魚於市孔氏曰晉語説此事云叔向既對宣子邢侯聞之而逃遂施邢侯氏孔晁云廢其族也則國語讀為弛訓之為廢家語説此事亦為弛王肅云弛宜為施施行也服䖍云施罪於邢侯施猶劾也邢侯亡故劾之可謂直矣傳本以直為義杜説失傳意猶義也夫數其賄稱其詐皆為國事言之杜疑傷義非也傳文語助也夫二字甚多未必皆是疑辭其治國制刑以下亦未必皆夫子語十五年戒百官孔氏曰周禮大宰祀五帝前期十日帥執事而十日遂戒享先王亦如之鄭𤣥云十日容散齋七日致齋三日也既卜又戒百官以始齋此戒百官亦謂戒之令齋去樂卒事禮也孔氏曰祭必有樂樂有文舞武舞文執羽籥武執干戚其入廟也必先文而後武叔弓之卒當籥始入之時故經舉籥入及其去之則諸樂皆去故經云去樂鐘鼔管磬悉皆去之非獨去籥舞也王大子壽卒陳氏曰傳見王大子卒不書王穆后崩陳氏曰傳見王穆后崩不書且為昭二十六年王子朝告諸侯起趙伯循曰王后世子卒葬不書王室不告諸侯不赴也民知義所孔氏曰十七年荀呉詐祭于雒以滅陸渾二十二年負甲偽糴以入昔陽而此時獨降而不納者此時荀呉自度已力必其能獲故因以示義以鼔子䳒鞮歸不書説見十二年陳氏曰十二年狄晉自後皆書卿帥師今按自晉悼公卒大夫將皆從其恒稱若其年晉荀偃衛寗殖十七年衛石買齊高厚十八年衛孫林父晉士匄二十四年齊崔杼二十五年鄭公孫夏之類無稱人者晉荀躒如周葬穆后陳氏曰傳見王后葬不書今按魯無使卿大夫弔葬王后之事傳見他國有之樽以魯壺孔氏曰周禮司尊彞云秋嘗冬烝其饋獻用兩壺樽鄭𤣥云壺者以壺為樽燕禮云司官尊于東楹之西兩方壺左𤣥酒是禮法有以壺為樽故曰籍氏孔氏曰九世之祖稱髙祖者言是髙遠之祖也郯子以少皥為髙祖意與此同其九世之次見世本而有三年之喪二焉孔氏曰喪服斬衰三年章内有為父為長子齊衰杖朞章内有夫為妻服問曰君所主夫人妻大子適婦鄭𤣥云記言君者主謂諸侯而天子亦與妻為喪主也然則妻服齊衰朞耳而傳以后崩大子卒為三年之喪二者喪服杖期章内有父在為母傳曰何以朞屈也至尊在不敢申其私親也父必三年然後娶達子之志也父以其子有三年之戚為之三年不娶則夫之於妻有三年之義故可通謂之三年之喪將焉用之傳見叔向譏不遂服三年杜説非又按預晉朝議大子之服謂周公不言高宗服心喪三年而云諒闇此服心喪之文也叔向不譏景王除喪而議其宴樂已早既葬應除而違諒闇之節也先儒謂其巧飾經傳以附人情此言除喪當在卒哭文又少異十六年諱之也陳氏曰傳見他年正月公在晉皆不書今按内見止執史皆不書公在晉有筆削説見襄二十九年傳初不及此齊侯伐徐孔氏曰虛舉經文者為下徐人行成起本使然丹誘戎蠻子嘉殺之陳氏曰傳見戎蠻子嘉不名賂以甲父之鼎陳氏曰晉自平丘之盟不能合諸侯而諸侯始有自為盟㑹者不書義見二十六年無伯也夫陳氏曰傳言昭公以來伯者不作而齊人横納北燕伯伐徐莒今為此㑹至剸陵而專盟矣又禦之適縣間孔氏曰諸侯享賓之禮亡唯有公食大夫之禮存耳其禮云大夫納賓賓入門左鄭𤣥云左西方賓位也又云及廟門公揖入賓入三揖至于階三讓公升二等賓升大夫立于東夾南西面北上士立于門東北面西上孔張後至葢賓入門乃始來至當從大夫適東夾之南西面位也張乃立於客間賓入未升階立于西方孔張入客行間也張初立客間在西方被禦適客後又益西也又被禦適縣間葢又復益西入於鐘磬樂肆之間也十七年伐鼓於社孔氏曰周禮大僕云凡軍旅田役贊王鼓救日月食亦如之鄭𤣥云王通鼔佐擊其餘面則日食王有親鼔之時也不君君矣葉氏曰昭子言天子諸侯之禮是矣而言用於正月則太史與平子皆失之夏書辰弗集千房以事秋言之則先王之禮不獨在正月凡食皆舉之矣經書日食三十六言鼔用牲于社者三其二皆在六月其一在九月左氏惑於太史之言故荘二十五年誤援之而火名孔氏曰帝系世本皆為炎帝即神農氏炎帝身號神農代號也而水名孔氏曰共工氏霸有九州祭法文也而龍名孔氏曰月令云其帝大皥易下繫云包犧氏之王天下也即大皥身號伏犧氏號也陸渾子奔楚奔不書外恒畧也陳氏譏不在奔非滅而奔不得有二義水火所以合也孔氏曰丙是火日午是火位壬是水日子是水位故丙午為火壬子為水卜戰不吉孔氏曰世本穆王生王子揚揚生尹尹生令尹匄獲其乘舟餘皇陳氏曰傳見楚令尹陽匄書人呉公子光但書國義見十三年春秋左氏傳補註卷八
