body:
  text: 春秋左氏傳補注卷九元趙汸撰昭公下十八年而代之孔氏曰毛氏世有采地為畿內之國於時天子微弱故自殺自伐不能禁之侈故之以孔氏曰鄭語云祝融其後八姓昆吾為夏伯世本云昆吾者衛是也然則昆吾國名言昆吾夏伯者以表昆吾國君其上世嘗為夏伯其惡熟誅者非此為伯之身當是後世之孫耳詩云韋顧既伐昆吾夏桀共桀同文又傳云乙卯亡知以乙卯日與桀同誅登大庭氏之庫以望之孔氏曰大庭氏古天子之國名也先儒舊説皆云炎帝號神農氏一曰大庭氏服虔云在黃帝前鄭玄詩譜云大庭在軒轅之前亦以大庭為炎帝也至于大宫孔氏曰子寬遊吉之子世族譜子寬與遊速渾罕為一人駟帶字子上六年死矣此别有子上非駟帶也楚語説事神之禮云使名姓之後能知犧牲之物彞器之量屏攝之位壇場之所而心率舊典者為之宗知屏攝是祭祀之位也鄭衆云攝攝束茅以為屏蔽其事或當然告于先君孔氏曰每廟木主皆以石函盛之當祭則出之事畢則納於函藏於廟之北壁之內所以辟火災也衛次仲云右主八寸左主七寸廣厚三寸穿中央達四方也范寧云天子主長尺二寸諸侯長一尺也白虎通云納之西壁鄅人藉稻孔氏曰周之六月夏之四月種稻之時其君自出觀行之藉猶藉蹈踐履之義服虔云藉耕種於藉田也今按國語宣王不藉千畝下云及藉膳夫農正陳藉禮王耕一墢則藉者耕種藉田之名記云天子田藉千畝諸侯百畝則諸侯比天子特多寡不同而已其禮則一粢盛六榖皆備此但言藉稻者如周禮掌稼下地者但名稻人舉一以包其餘也舊説誤以藉為藉蹈又轉為履行學者疑之遂引此為周不改月之證不以服説考之故也原氏其亡乎陳氏曰再為王室亂起本大為社孔氏曰祭祀有常而云大為社者此非常祭之月而為火特祭禮物備具大於常祭故稱大也曰毁於北方劉氏曰近上十二年鄭簡公卒將為葬除及遊氏之廟將毁焉子太叔使其除徒執用以立曰不忍廟也子産乃使辟之此兩傳實一事也魯鄭異國説者不同或謂葬時事或謂搜時事而丘明則兩記之何以明其然耶曰狃於小數而不知已非子大叔事也前既不忍毁以為惠矣俄而又自隳之亦非子産事也十九年以持其世而已陳氏曰傳言楚之衰楚夫人嬴氏至自秦陳氏曰為二十年太子建奔起飲大子止之藥而卒傳序許止之弒語簡事盡臣子於君父雖非故亦書弒春秋修辭兼禮法二傳説者皆不及此張氏曰藥劑之得失決死生於須臾瘧疾未足以死而遽至於大故是藥殺之也進藥而藥殺可不謂之弒哉所以異於商臣蔡般者過與故不同爾大子奔晉不書奔非故弒異於慶父宋萬陳氏曰不書奔以弒君為義同盟于蟲陳氏曰不書義同十六年蒲隧以度而去之孔氏曰紡為紡麻作纑也此婦人以麻纑度城髙下令長與城等而去藏之去即藏也字書去作弆羌吕反謂掌物也今關西仍呼為弆東人輕言為去音莒齊師入紀傳見外入邑不書成九年楚入鄆特書之其父兄立子瑕孔氏曰按世本子遊子瑕並公孫夏之子杜云叔父未詳懼隊宗主孔氏曰大夫繼世為一宗之主恐隊失也服虔云祏主藏於宗廟故曰宗主少牢饋食大夫禮也大夫無主何所隊乎非撫之也陳氏曰為定四年楚敗張本乃歸蹶由陳氏曰傳言楚實不競於吳乃反所執二十年日南至孔氏曰歷法十九年為一章章首之嵗必周之正月朔旦冬至僖五年正月辛亥朔日南至是章首之嵗年也計僖五年至往年合一百三十三年是為七章今年復為章首當言正月己丑朔日南至今傳乃云二月己丑日南至是錯名正月為二月也歷之正法往年十二月後宜置閏月即此年正月當是往年閏月此年二月乃是正月故朔日己丑日南至也時史失閏往年錯不置閏傳於八月之下乃云閏月戊辰是閏在二月後也太子建奔宋陳氏曰奔非其罪雖大子不書義同莒郊公執已以至服虔氏曰城父人城父大夫也公子地以為質孔氏曰定十年經書宋公之弟辰時當景公之世辰及地不得為元公之弟也世族譜辰地皆為元公子此諸本皆云元公弟當時轉寫誤耳故齊豹陳氏曰傳見齊豹既奪司寇故書盜使華齊御公孟孔氏曰諸本皆華上有使字計華齊是公孟之臣自為公孟之御非齊氏所當使必不得有使字學者以上文有使祝蛙使一乘下有使華寅乘二車使華寅執蓋以此妄加使字今定本有使非也公如死鳥不書説在僖二十八年陳氏曰傳言衛無政幾以盜喪國所以書盜殺衛侯之兄遂伐齊氏滅之誅盜不告義同尉止丁巳晦孔氏曰丙辰丁巳乃是頻曰其事既多不應二日之中并為此事今杜不云日誤者以誤在可知且宣二年壬申朝于武宫注云壬申十月五日既有日而無月冬又在壬申下明傳文無較例又注哀十二年傳云此事經在十二月螽上今倒在下更具列其月以為别者傳本不以為義例故不皆齊同如杜此言或傳因簡牘之辭不復具顯其日月今按此説得之而未盡故劉侍讀每疑傳妄説見二十三年公子朝公子不書奔者衛人以殺宣薑故諱不告朝尋反國二十二年會救宋齊侯疥遂痁孔氏曰後魏李繪聘梁梁人袁狎與繪言及春秋説此事云疥當為痎痎是小瘧痁是大瘧以小致大非疥也按説文疥搔也瘧熱寒并作痁有熱瘧痎二日發瘧是齊侯之瘧初二日一發後遂頻日熱發故曰疥遂痁以此久不差若其不然疥搔小患與瘧不類何云疥遂痁乎祈望守之孔氏曰此皆齊自立此名故與周禮不同山澤之利當與民共之言公立此官使之守掌專山澤之利不與民共故鬼神加怒而病也故寬難為政用猛非君子之道也或是因大叔所偏而矯之政是以和此非聖人之言善為政者寬不至慢猛不至殘可也待其慢然後濟之以猛見其殘然後濟之以寬則上下交相病久矣故剛柔無兩用之道寬猛非相濟之具左氏不得與七十子之徒接所引聖人語每多傅會古之遺愛也遺愛猶云德澤在人指從政言之二十一年天王將鑄無射孔氏曰襄十九年季武子作林鐘亦是鐘聲應林鐘之律也此無射之鐘在王城鑄之敬王居洛陽蓋移就之也秦滅周其鐘徙於長安歷漢魏晉常在長安及劉裕滅姚泓又移於江東歷宋齊梁陳其鐘猶在東魏使魏收聘梁收作聘遊賦云珍是淫器無射髙縣是也及開皇九年平陳又遷於西京置大常寺時人悉共見之至十五年敕毁之位在卑孔氏曰喪大記國君初死之禮云既正尸子坐于東方卿大夫父兄子姓立于東方有司庶士哭于堂下北面鄭玄云正尸者謂遷尸牗下南首也子謂大子子姓謂衆子孫也彼初死之時即别適庶况其至葬君道成矣失位明其不在適子位也位在卑蓋處其庶兄之下以齊鮑國歸費之禮為士鞅孔氏曰杜以周禮掌客諸侯牢禮各以其命數卿大夫來者亦當牢禮如其命數計鮑國齊卿不過三命於法當三牢而魯人失禮為鮑國七牢也下云加四為十一知本七牢也為十一牢陳氏曰傳積魯不守禮之失至相過也孔氏曰日之行天一嵗一周月之行天二十九日有餘已得一周日月異道互相交錯月之一周必半在日道裏從外而入內也半在日道表從內而出外也或六入七出或七入六出凡十三出入而與日一會歷家謂之交道通而計之一百七十三日有餘而有一交交在望前朔則日食望則月食交在望後望則月食後月朔則日食此自然之常數也交數滿則相過非二至乃相過也傳之所言以一分日夜等者春分之時朔則日在婁望則月在角秋分之時朔則日在角望則月在婁婁角是天之中道日月俱從中道故晝夜等似有體敵之理月可敵日冬至之時朔則日在斗望則月在井夏至之時朔則日在井望則月在斗斗井南北晝夜長短之極似若月之極長可以掩日然故云至相過謂絶相懸殊也此唯冬至耳言二至者全句以成文此皆假託以為言非實事也劉炫云此皆假其事以為等差其實災之大小不如此也故常為水孔氏曰言其他非分至之月則為災二十四年五月日食梓慎曰將水其年八月大雩又七年四月甲辰朔日食春分之月而云魯衛惡之常水之言既無其驗足知是假託日食以為戒耳而不能送亡送亡句絶孔説非救宋不書救宋以出奔為義説見屬辭陳氏曰傳言晉以諸侯之師救宋圍南里不書與圍彭城書法異吕封人華豹張丐為右孔氏曰吕邑封人官名豹即下文華豹是也本或豹上有華釋例譜一人再見名字不同皆兩載之宋雜人內有吕封人豹華豹為一人知此本無華也不狎鄙孔氏曰狎言更遞也城謂豹女頻射我不使我得更遞是為鄙也豹服此言故抽矢而止豹亦不達軍之戰禮也諸侯唯宋事其君孔氏曰言諸侯之內唯宋之臣民善事其君以前未嘗有叛逆者也俗本或無其字若無其字則是唯宋事楚檢於時宋國不屬楚也故辭公陳氏曰傳言晉失諸侯二十二年敗齊師于壽餘傳見帥賤不書併齊侯已犧何害孔氏曰犧者寵牲之名因以喻寵子言寵愛為犧者依法用牲今寵愛為犧者乃實用人他人寵之如犧後實招禍難矣己子寵之如犧有何害也犧者實用人人是對牲為稱據凡人也人犧實難此人據疏外之人上下人意異王弗應孔氏曰賈逵以為大子壽卒景王不立適子鄭衆以為壽卒王命猛代之後欲廢猛立朝耳服虔以賈為然杜從鄭説者二十六年傳閔子馬云子朝干景之命則景有命矣若子朝子猛並未有命俱是庶子朝又年長於次當立自求為嗣宜矣劉蚠何以惡其為亂而欲去之若俱未被立王意不偏羣臣無黨王命為嗣則莫敢不從何須將殺單劉以立朝也盟羣王子于單氏孔氏曰猛朝俱是王子單劉必欲立猛明猛是次正當立故也猛為次正不知其本蓋是大子壽之母弟或是穆后姪娣之子或母貴也安定胡氏曰十五年太子壽卒至此八年不更立者冇母弟故也今按胡氏之説雖未若鄭杜考傳之精其明猛為次正則一也經書王猛所以定一時猶豫決千載嫌疑于莊宫以歸孔氏曰敬王位定乃追諡之以納王于王城陳氏曰不書晉義繫於劉單今按經傳時月不同由左氏所據史籍訛舛别無考證悉仍其舊以示傳疑之法杜氏惟據長歷輒云經誤非也敬王即位孔氏曰敬王名丐本紀文也本紀不言敬王是猛之母弟先儒相傳説耳二十三年二師圍郊孔氏曰圍郊在叔鞅卒前告在叔鞅卒後故經書在後圍郊在朔或亦在叔孫婼如晉之前庚戌還亂未弭而告間必二卿不親事師不肅也觀明年士景伯涖問周故晉人乃辭子朝不納其使則前此觀望可知陳氏曰傳去年言晉籍談荀躒見書人獲鉏弱地取邾師不書非侵伐晉人來討劉氏曰是年正月有壬寅朔有庚戌有癸丑傳敘邾事在庚戌之後經記叔孫如晉在癸丑之前夫庚戌癸丑四日耳邾人已能訴于晉晉人已能來討何其神速也故曰不然今按左氏傳采衆記以釋經其附麗斷截皆以經為主或先經以始事或後經以終義則所記之事各有本末自不容以日月次其先後如此年傳自壬寅朔至庚戌還是記晉人圍郊本末自邾人城翼至晉人來討是原叔孫如晉之由非謂邾人城翼以後所記之事皆在庚戌後也如劉侍讀所難則作傳者必如近代所修日厯而後可尹圉誘劉他殺之陳氏曰傳見尹圉召伯奐奔不書名尹圉書氏并劉蚠單旗亦著不名之實齊人納郊公陳氏曰傳言郊公出入皆不書與鄭忽異帥賤陳氏曰傳見所以不書楚杜氏以薳越非正卿是矣又言不書楚楚不自戰何其戾也今按將雖卑師不可沒夷狄交相敗不書陳氏發例也亦自違之何也吳子從之不稱吳子夷狄舉號例後倣此戰于雞父釋例曰泓之戰書己巳朔鄢陵之戰書甲午晦此書戊辰而不言晦者經傳之見晦朔時史隨其日而存之無義例也今按經傳所書日月不同者多矣何獨晦朔為異杜謂時史無義例非也楚未陳也劉氏曰吳乘楚師之求偹而薄之猶未陳也故不言戰胡子髠沈子沉滅閔公二年狄滅衛不言君滅此特舉其君言之者懿公雖無道於其民猶云死社稷也胡沈之君幼而狂為楚所用而死故但指其身言之書法之有不同也獲陳夏齧大夫生死皆曰獲僖公元年獲莒子之弟拿哀公二年獲齊國書獲之義同此尹氏立王子朝春秋之卒尹氏見尹氏世執周柄貽禍天家至是復背單劉立子朝尋俱奔楚南宫極震但言南宫極震則是以震死不必為屋所壓其三川震周語云幽王二年西周三川皆震西王傳見子朝所以書立楚大子之母在郥孔氏曰土地名郥是蔡地蔡在楚之東北故建母在郥得召吳人也諸樊入郥孔氏曰吳子諸樊吳王僚之伯父也僚子又名諸樊乃與伯祖同名吳人雖是東夷理亦不應然也此久遠之書又字經篆隸或誤耳能無亡乎孔氏曰子囊城郢君子謂之忠囊瓦城郢沈尹戌謂之必亡事不同者囊瓦畏吳侵逼不能遠撫邊竟唯欲近守城郭其事異故也二十四年以甘桓公見王子朝傳見子朝之亂皆世臣實為之尊晉也説見十四年意如涖問周故孔氏曰晉助敬王久矣今使景伯如周問曲直者以子朝更強久競未決晉人恐敬王不成更審其事故疑而使察之也晉人於此乃辭王子朝不納其使則以前猶與往來其心兩望至此始絶耳今按傳見晉人猶未知適從晉之恥也傳見王室之故天下責望在晉期以明年傳見晉人怠於勤王遂滅巢及鍾離巢即五年薳啓疆所城者本屬楚小國故得言滅鍾離邑略非不告劉氏曰巢伯爵國非楚邑本書序巢伯來朝二十五年曰明年將納王晉人徴會則曰明年納王又曰明年傳見不惟怠且觀望民之行也孔氏曰人稟天地之性而生動作皆象天地但人有賢與不肖行有過與不及聖人制為中法名之曰禮易及爾雅並訓履為禮是禮名由踐履而生也人之本性自然法象天地聖人還復法象天地而制禮教之是禮由天地而來故子産論禮皆天地人三者並言之是以長久孔氏曰自夫禮至因地之性言禮本法天地也自生其六氣至民失其性言天用氣味聲色以養人不得過其度也是故為禮以下言聖人制禮以奉天性不使過其度也請終身守此言也傳見趙鞅不在王室其將及乎傳云書所無也釋經之義畢矣師已曰以下乃小説傅會之辭或云好事者所增益也季氏介其雞孔氏曰鄭衆云介甲也為雞著甲髙誘注吕氏春秋云鎧著雞頭杜此二説皆不可解以郈氏為金距言之則著甲是也其衆萬於季氏釋例曰禘於大廟禮之常也各於其宫時之為也雖非三年大祭而書禘用禘禮也孔氏曰季氏私祭家廟與禘同日言將禘是豫部分也先君之廟孔氏曰杜以襄若以次遞毁則廟與先公同處禘於襄公亦應兼祭餘廟今特云禘於襄公似與先公異處故云蓋襄公别立廟大夫遂怨平子傳積季氏失人心之事以察罪弗許孔氏曰釋例土地名襄十八年沂水出東莞蓋縣艾山南經琅邪東海至下邳縣入泗此沂水出魯國魯縣西南入泗水以其有二故辨明之君必悔之弗聽傳見公不能用子家子之言故失國是無叔孫氏也陳氏曰傳言叔季於是始合執氷而踞孔氏曰方言弓藏謂之鞬或謂之犢丸此或説犢丸是箭筒其蓋可以取飲十三年傳云司鐸射奉壺飲氷謂執此也詩云抑釋掤忌抑鬯弓忌鬯藏弓則氷藏矢也毛傳云掤所以覆矢掤與氷雖異音義則同是一器也公徒將殺昭子孔氏曰昭子謀歸安衆而後納公則獨公得入從公伐季氏者不得入故欲殺昭子也戊辰卒昭子有納公之心軋於季氏不克而自殺原其志蓋內畏臧郈及羣公子欲兼存叔季相為唇齒而已使其能以已邑為公邑已衆為公徒外請齊晉宋衛以討季氏而納公季氏雖強有不為僇乎使齊晉果援季氏亦不過能亡而已惜其蔽於患失而徒死也公徒執之孔氏曰古者馬以駕車不單騎也曲禮云前有車騎者禮記漢世書耳經典無騎字劉炫謂左師展將以公乘馬而歸欲共公單騎而歸此騎馬之漸今按公羊傳齊侯唁公于野井言以鞍為凡與此言乘馬相合則當時固已有單騎者蓋從公出者或車或騎也所以藉幹者孔氏曰説文云楄方木也幹脅也木以藉幹明是棺中笭牀齊侯圍鄆陳氏曰傳見經書取不言圍他倣此使為賈正焉孔氏曰賈正如周禮之賈師也郈在後為季氏私邑此時尚為公邑故使賈正通計簿於季氏僂句不余欺也陳氏曰季臧亦交惡二十六年齊侯取鄆經併上圍書取傳紀其實杜説非穀梁傳曰以其為公取之故易言之其説皆通也君若待于曲棘孔氏曰曲棘宋地齊侯欲納魯君當是從齊向魯必不遠涉宋地土地名齊地無曲棘十年傳桓子召子山而反棘焉此即彼棘也本無曲字涉上卒于曲棘誤加曲耳師及齊師戰于炊鼻戰不書為魯諱臣拒君也故齊師圍成特書公以見義杜説非七入者三寸孔氏曰説文車軛下曲者襄十四年傳稱射兩軥而還蓋朐軥字通用耳繇即由也訓為從也謀納公也陳氏曰傳載昭公十六年齊徐郯莒盟于蒲隧十九年宋邾郳徐盟于蟲則諸侯有不待伯者而自盟會者久矣於是始書今按諸侯自相盟不書與外特相盟不書同義此以公會書劉子以王出孔氏曰二十三年傳云六月庚寅單子劉子樊齊以王如劉蓋從劉而居狄泉自狄泉又居於劉今為子朝所逐蓋自劉而出也服虔云出成周也按二十三年天王居于狄泉狄泉雖近成周成周不屬王也其傳云召伯奐南宫極以成周人戍尹二十四年傳云王子朝用成周之寶圭于河是成周屬子朝之驗也二十五午黃父之會趙簡子令諸侯之大夫云明年將納王納王者欲納之於成周耳若敬王先在成周無為更須納之知此出者從劉出耳王次于滑孔氏曰王雖未有安居終亦不出畿內知此皆周地陳氏曰傳備敬王播遷之故奉周之典籍以奔楚傳見尹氏毛伯名陳氏曰召伯召伯奐也杜言當稱召氏非隂忌奔莒以叛王人叛史不書王入于成周東萊吕氏曰漢河南縣即郟鄏周武王遷九鼎周公營以為都是為王城洛誥所謂卜澗水東瀍水西惟洛食者也漢洛陽縣周公營下都以遷殷頑民是為成周洛誥所謂卜㕓水東亦惟洛食者也平王東遷定都于王城子朝之亂其餘黨多在王城敬王畏之徙都成周臨川吳氏曰王城曰東都蓋以鎬京為周之西都東對西而言也成周曰下都蓋以王城為洛之上都下對上而言也王入于莊宫陳氏曰傳言敬王之亂四年而後定故經不與單劉以復辟之義而深罪晉汪氏曰傳記王入于莊宫杜注莊宫在王城則敬王亦入王城矣三十二年書城成周蓋敬王入王城而弗居遂定都成周也王子朝使告于諸侯傳見子朝奔在王入前書在王入後王入乃告諸侯以間王政孔氏曰周本紀云彘之亂宣王在召公之宫國人圍之召公以其子代大子大子竟得脫周召二公二相行政號曰共和元年是其釋位與治王政之事也而後效官孔氏曰周本紀云共和十四年厲王死于彘大子靖長于召公家二相乃共立之為王是為宣王共和之年官之政事皆決於二相宣王長而有志二相乃致其官政於王也效者致與之義用遷郟鄏劉炫氏曰如國語史記之文幽王止立伯服為大子耳既虜褒姒必廢其子未立為王而得稱攜王者或幽王死後褒姒之黨立之為王也汲冡書紀年云平王奔西申而立伯盤以為大子與幽王俱死于戲先是申侯魯侯及許文公立平王於申以本大子故稱天王幽王既死而虢公翰又立王子余臣於攜周二王並立二十一年攜王為晉文公所殺以本非適故稱攜王束晳云舊説攜王為伯服伯服古文作伯盤非攜王也二十七年使延州來季子聘于上國釋例土地名延州來闕杜意謂吳地别有州來按十三年吳滅州來十九年楚人城州來則州來未為吳有可知二十三年吳伐州來楚薳越以諸侯之師奔命救州來師敗二君滅楚師大奔二十四年吳更滅巢及鍾離則州來自薳越不能救卒為吳有可知矣然則季子所封不必别有其地吳世家季札封于延陵故號曰延陵季子故杜謂延陵其本封至此時又益以州來也孔氏曰吳地勢卑下中國在其上流故謂中國為上國也亦不知其聘幾國經不書來必不至魯擅弓云延陵季子適齊於其反也其長子死葬於嬴博之間鄭玄云魯昭公二十七年聘於上國是也以濟師孔氏曰都邑之士以君子為號故知是有復除者謂優復其身除其徭役賈逵云然今之律令猶名放課役者為復除或平常免其徭役事急乃使之周禮校人掌養馬諸侯六間養馬之人多矣此唯養馬不給餘役今亦事急而徴使之遇于窮釋例土地名窮闕吾欲求之孔氏曰吳世家云吳子壽夢有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢而壽夢欲立之季札讓不可乃立諸樊諸樊卒有命授弟餘祭欲傳以次必致國於季札餘祭卒弟餘昧立餘昧卒欲授季札札讓逃去於是吳人乃立餘昧之子僚為王公子光者王諸樊之子也常以為吾父兄弟四人當傳至季子季子不受光父先立光當立遂殺王僚光代立為王公羊傳曰僚者長庶也世本云夷昧生光服虔云夷昧生光而廢之僚者夷昧之庶兄夷昧卒僚代立是用公羊為説也司馬遷采世本為史記而今之世本與遷言不同世本多誤不足依馮故杜以史記為正也光言王嗣者言已是世適之長孫也是無若我何言此事無人如我何於魚中以進吳世家云鱄諸置七首於炙魚之中以進食事君如在國事君如在國即後文賈馬歸從者衣屨之類此季孫之姦也杜氏乃以書公行告公至當之謬矣説在屬辭乃辭小國而以難復傳見諸侯皆欲納公晉卿貪故弗克此必敗也孔氏曰言尚有鬼神以助君此戰必當敗也况無鬼神乎其飲酒也禮諸侯相為賓有享食燕三禮享者享太牢以飲賓子家知齊侯必不為公設享禮第以享為辭耳使宰獻而請安孔氏曰燕禮者公燕大夫之禮也公雖親在而别有主人鄭玄云主人宰夫也杜以宰獻而請安謂齊侯請自安於别室不在坐也劉炫云按燕禮司正受命西階上北面命卿大夫君曰以我安卿大夫皆對曰諾敢不安彼自請賓使自安當如彼使宰請魯侯自安耳主人請安謂主人使司正請安于賓服虔亦然今知不然者按鄉酒禮賓主相敵主人亦請安于賓齊侯與公敵禮安賓乃是常事何須傳載其文明是齊侯請欲自安慢公之甚今按下公請使重見則齊侯欲自安可知故子家得以君出使齊侯在坐魯君豈容遽出也二十八年辱在寡人誚公先齊而後晉非謂不告而後逆之陳氏曰傳言經所以書如晉次乾侯長叔姒生男孔氏曰子容是伯華之子其兄弟伯華最長叔向次之其餘諸弟皆小於叔向故叔向為長叔叔向之妻其年長於子容之母故稱長叔姒也爾雅釋親云長婦謂稚婦為娣婦娣婦謂長婦為姒婦自以身之長稚相謂也皆舉親也孔氏曰由武王克商得封建諸國功歸於武王耳此十五國或有在後封者尚書康誥之篇周公營洛之年始封康叔于衛洛誥之篇周公致政之年始封伯禽于魯九年傳曰文武成康之封建母弟則康王之世尚有封國宣王方始封鄭勤施無私曰類鄭氏曰類善也無失類者不善之謂也是以再歎孔氏曰晉使卿為軍將謂之將中軍將上軍及六國以來遂以將軍為官名蓋其元起於此二十九年及原伯魯之子陳氏曰天子殺大夫不書例在桓十八年隂不佞敗之陳氏曰雖王子叛亦不書是尊是奉孔氏曰王者祭木火土金水之神而以此人之神配之食非專祭此人也分五行以配四時故五行之神句芒祝融之徒皆以時物之狀而為之名此五者本為五行之神作名耳非與重該之徒為名也雖本非配人之名而配者與之同食亦得取彼神名以為配者神名猶社本土神之名稷本榖神之名配者亦得稱社稷也今按傳云木正曰句芒又曰使重為句芒以下皆然又云世不失職則句芒至后土亦是當時官名非為配食故得取所配神名以為稱也此其三祀也孔氏曰窮桑少皥之號帝王世紀亦然賈逵云處窮桑以登為帝故天下號之曰窮桑帝定四年傳稱封伯禽於少皥之虛土地名窮桑闕言在魯北相傳云耳以鑄刑鼎孔氏曰冶石為鐵用槖扇火謂之鼓計令一鼓便足也三十年非公且徴過也鄆在境內故以書至書居為義乾侯晉地故書所在見公出在外杜陳皆曲傅傳意晉人不能詰陳氏曰傳言諸侯事晉之怠因見葬禮三十一年子姑歸祭傳見晉卿黨於季氏昭公所以不得歸國其善志也齊豹既奪司寇自不應書名非合書而不書者邾莒小國之臣接我則書名非不合書而書者傳於魯史書法類失考據曲説不近人情先儒非之宜也然齊豹乃齊惡之子公孟雖奪其司寇與邑而有役乃反之則猶在大夫之後與士不同而同書盜左氏發義蓋以此如齊邴歜閻職二人皆士也宜稱盜而稱人杜氏謂不稱盜罪商人先儒亦非之二義交互不同皆未有不易之説公羊傳曰大夫弒君稱氏名賤者窮諸人大夫相殺稱人賤者窮諸盜蓋周制大夫士皆有上中下三等春秋大夫非卿乃稱人窮諸人謂賤者非一等止於稱人雖士之賤者亦居官食祿自當坐以弒君如邴歜閻職不稱盜是也窮諸盜謂賤者非一等止於稱盜既非兩下相殺則當坐以盜殺如齊豹非士而稱盜是也苟稱人以殺亦與討亂無辨以公羊此義推左氏事實則二義皆得矣然盜殺蔡侯申自以蔡人諱弒君以盜殺赴公羊不知蔡盜乃諸大夫而又以賤乎賤為義遂與本例相違如兩下相殺書名氏榖梁有例今乃謂大夫相殺書人何氏又妄為之注此傳注家専門之敝春秋之旨所以未易明也三十二年又不能用其人也經書公在其義一也傳作三等釋之其失與不書即位同况敢干位以作大事乎傳見狄泉之盟所以不書魏舒所以不序不可以假人史墨對趙簡子與襄十四年師曠對晉侯皆釋君助臣阿附強家所謂社稷無常奉君臣無常位乃黨逆附篡之辭不可為訓春秋左氏傳補注卷九
