body:
  text: 春秋左氏傳補註卷一元趙汸撰隱公是以隱公立而奉之陳氏曰傳言惠公再娶以起禍奉桓為太子自謂攝主皆隠之志今按傳於簒公子皆詳其母貴賤與君父寵愛之私以見禍亂所由起蓋所得列國史志猶可考也禮諸侯一聘九女諸侯不再娶見莊十九年公羊傳諸侯立子之制見隱元年何氏註後見文六年啖氏曰左氏得魯晉宋齊楚鄭等數國之史編次年月以為傳記又廣采當時文籍故兼子産晏子及諸國卿佐家傳并卜書夢書及雜占書縱横家小說諷諫等雜在其中雖是非交錯混然難證能令百代之下頗見本末因以求意經文可知元年春王周正月春秋雖修史為經猶存其大體謂始年為元年歲首為春一月為正月加王於正皆從史文傳獨釋王正月者見國史所書乃時王正朔月為周月則時亦周時孔氏謂月改則春移是也後於僖公五年春記正月辛亥朔日南至昭十七年夏六月記太史曰在此月也日過分而未至當夏四月是謂孟夏又記梓慎曰火出於夏為三月於商為四月於周為五月皆以周人改時改月春夏秋冬之序則循周正分至啓閉之候則仍夏時其經書冬十月雨雪春正月無氷二月無氷及冬十月隕霜殺菽之類皆為記災可知矣汲冡周書有周月解亦曰夏數得天百王所同商以建丑為正亦越我周作正以􅂷三統至於敬授民時巡狩祭享猶自夏焉其言損益之意甚明經書春烝春狩夏蒐以此蓋三正之義備矣而近代說者往往不然夫以左氏去聖人未逺終春秋二百四十二年以及戰國之際中國無改物之變魯未滅亡傳於當時正朔豈容有差而猶或有為異論者何也蓋嘗考之曰殷周不改月者據商書言元祀十有二月而秦人以十月為歲首曰夏時冠周月者則疑建子非春而孔子嘗欲行夏之時也按太史公記三代革命於殷曰改正朔於周曰制正朔於秦曰改年始蓋正謂正月朔謂月朔何氏公羊註曰夏以斗建寅之月為正年旦為朔殷以斗建丑之月為正雞鳴為朔周以斗建子之月為正夜半為朔是也殷周即所改之月為歲首故曰改正朔曰制正朔秦即十月為歲首而别用夏時數月故曰改年始其言之已詳漢書律厯志據三統厯商十二月乙丑朔旦冬至即書伊訓篇太甲元年十有二月乙丑朔伊尹祀于先王以冬至越茀行事其所引書辭有序皆與偽孔氏書伊訓篇語意不合且言日不言朔又不言即位則事在即位後矣凡新君即位必先朝廟見祖而後正君臣之禮今即位後未踰日復祠于先王以嗣王見祖此何禮也暨三祀十有二月朔奉嗣王歸于亳是日宜見祖而不見又何也所謂古文尚書者掇拾傅㑹不合不經蓋如此說者乃欲按之以證殷周不改月可乎又言後九十五歲十二月甲申朔旦冬至無餘分春秋厯周文王四十二年十二月丁丑朔旦冬至後八嵗為武王伐紂克殷之歲二月己丑晦大寒閏月庚寅朔三月二日庚申驚蟄周公攝政五年正月丁巳朔旦冬至禮記孟獻子亦曰正月日至七月日至其說皆與傳合夫冬至在商之十二月在周之正月大寒在周之二月驚蟄在三月夏至在七月而太初厯其在立冬小雪則曰於夏為十月商為十一月周為十二月唐人大衍厯追算春秋冬至亦皆在正月孰謂殷周不改月乎陳寵曰陽氣始萌有蘭射干芸荔之應天以為正周以為春陽氣上通雉鴝雞乳地以為正殷以為春陽氣已至天地已交萬物皆正蟄蟲始振人以為正夏以為春蓋天施於子地化於丑人生於寅三陽雖有徵著三正皆可言春此亦厯家相承之說所謂夏數得天以其最適四時之中爾孰謂建子非春乎乃若夫子答顔子為邦之問則與作春秋事異蓋春秋即當代之書以治當代之臣子不當易周時以惑民聽為邦為後王立法故舉四代禮樂而酌其中夫固各有攸當也如使周不改時則何必曰行夏之時使夫子果欲用夏變周則亦何以責諸侯之無王議桓文而斥呉楚哉何氏哀十四年傳註曰河陽冬言狩獲麟春言狩者蓋據魯變周之春以為冬去周之正而行夏之時以行夏之時說春秋蓋昉於此然何氏固以建子為周之春但疑春不當言狩而妄為之辭至程子門人劉質夫則曰周正月非春也假天時以立義爾則遂疑建子不當言春此胡氏夏時冠周月之說所從出也先儒見孟子謂春秋天子之事而述作之㫖無傳惟斟酌四代禮樂為百王大法遂以為作春秋本意在此故鄱陽呉仲迂曰若從胡傳則是周本行夏時而以子月為冬孔子反不行夏時而以子月為春矣何氏之失又異於此故子朱子以謂恐聖人制作不如是之紛更煩擾錯亂無章也薛氏又謂魯厯改冬為春而陳氏用其說於後傳曰以夏時冠周月魯史也是蓋知春秋改周時為不順而又移其過於魯爾然謂魯有厯實劉歆之誤按律厯志言劉向所總有黄帝顓頊夏殷周厯及魯厯為六厯自周昭王以下無世次故據周公伯禽以下為紀自煬公至緡公冬至殷厯每後一日則由厯家假魯君世次逆推周正交朔之合否因號魯厯非魯人所自為明矣宋書禮志又言六厯皆無推日食法但有考課疏密而已是豈當代所嘗用者哉劉歆惑於襄哀傳文遂謂魯有司厯而杜氏因之謬矣然說者亦自病夏時周月不當並存故直謂春秋以夏正數月又疑若是則古者大事必在歳首隱公不當以寅月即位其進退無據如此固不足深辨而或者猶以為千古不決之疑則以詩書周禮論語孟子所言時月不能皆合故也夫三正通於民俗乆矣春秋本侯國史記書王正以表大順與頒朔告朔為一體其所書事有當繫月者有當繫時者與他經不同詩本歌謠又多言民事故或用夏正以便文通俗書乃王朝史官記言之體或書月則不書時或書時則不書月况偽孔注二十五篇決非眞古書其有合有否皆不可論於春秋周禮所書正月正歲皆夏正也諸官制職掌實循二代而損益之其著時月者又多民事與巡狩烝享自夏者同故仍夏時以存故典見因革蓋非赴告䇿書定為一代之制者皆得通言之則又不可論於春秋矣若論語言莫春亦如詩書言春夏皆通民俗之恒辭也不可據以為周不改時孟子言七八月之間旱十一月徒杠成十二月輿染成在左傳後則周改月猶自若竹書又記晉曲沃莊伯之十一年十一月魯隱公之元年正月也竹書乃後人用夏正追録舊史故與春秋不同然亦未嘗輒以夏正亂春秋之時月也蓋殷周改時月與所損益只是一理如尚齒之由貴徳而貴富而尚親親迎之由庭而堂而户大事之由昏而日中而日出之類皆是迭進法所以順天道通世變在當時自不為異故孔子以為百世可知非徒曰以易人之觀聽而已彼秦人以三代為不足法既不足以知之而後之蔽於今而不知古者亦不足以言之也自啖趙而後學者往往習攻左氏而王周正月為甚以其尤害於經特詳著焉不書即位攝也傳言史不書即位皆以故廢穀梁氏不知禮有攝主之我妄以隱為讓說者因疑傳言攝為非孔氏曰膏肓何休以為古制諸侯幼弱天子命賢大夫輔相為政無攝代之義昔周公居攝死不記崩今隱公生稱侯死稱薨何因得為攝者周公攝政仍以成王為主直攝其政事而已所有大事稟王命以行之致政之後乃死故卒稱薨不稱崩隱公所攝則位亦攝之以桓為太子所有大事專命以行攝位被殺在君位而死故生稱公死稱薨是與周公異也且公羊以為諸侯無攝鄭康成引公羊難云宋穆公云吾立乎此攝也以此言之何得非左氏下傳曰公攝位而欲求好於邾是位亦攝也所以異於正君者元年不即位行還不告廟不臨惠公之葬不成聲子之喪尊仲子為夫人薨則赴於諸侯又為之立廟此是謙之實也蘇氏曰禮記曾子問君薨而世子生如之何孔子曰卿大夫奉攝主於西階南面古者天子諸侯卿大夫世子未生而死若生而弱未能君也則其娣姪之子次當立者為攝主故隱公亦攝主也黄先生曰先君失禮再娶非臣子所當議隱公攝位以俟桓長得事之宜不可言讓貴之也陳氏曰傳釋未爵命之君恒稱名於是特書字且見春秋之初諸侯猶稟王命非公命也傳見國史有不書之法蓋指䇿書正史言之非公命不登于策所以重正史而致其嚴故杜氏謂小事簡牘而已左氏世為國史凡經不書而簡牘有據者悉取以為傳其經首所發不書之義皆史例也外事如崩薨卒葬盟㑹侵伐勝敗禍福經不書而未得其說者間亦推史例以釋之蓋其所知者惟此而已由策書正史夫子所據以施筆削者左氏亦未及見故不能有所發明此經㫖失傳之由也杜氏修傳例以釋經凡傳見其事而經無者於内則曰非公命不告廟於外則曰從赴告不赴告遂以史例為經義而不復知有聖人筆削之權諸稱書不書先書故書之類槩以為孔子新意故啖趙以後說者皆非之遂惡之史記鄭世家姜氏生太子寤生生之難及生夫人弗愛蓋以為難産也譏失敎也陳氏曰傳釋譏君例難之也陳氏曰傳釋不書奔例且言以克為重今按此春秋特筆也杜氏以為夫子改正舊史孔氏謂準魯史之法惟當書鄭伯之弟段出奔共其說皆是蓋辭旨卓異非史氏所及也遂為母子如初於此見傳兼取雜書小說不盡出諸國史記後蔡姬蕩舟曹共觀裸之類皆然且子氏未薨故名傳以宰咺為冡宰如宰周公之比故必貶而後名之春秋不以名號為褒貶在魯史亦無責王臣之義左氏見魯史有以貴之而書字者若邾儀父是也有以卑之而降爵者若杞子是也因執之以為褒貶之法此一字褒貶之繆所從起也孔氏曰周官宰夫凡邦之弔事掌其戒令與財幣器帛既掌其事或即充使吳先生曰王朝中士恒稱名宰者其人之姓皆得之陳氏曰緩且子氏未薨故名以下疑後人増益之雜記有大夫士訃於他國之君之禮則不但同位外姻也且文九年秦人歸成風之禭傳曰禮也諸侯相弔賀雖不當事苟有禮焉書也以無忘舊好則贈不及尸弔不及哀非禮也與文公傳自相違今不取豫凶事說者多疑傳妄朱子曰古人不諱凶事如國君即位為椑之類夷不告故不書夫子筆削是據策書所有策書所無者不復論杜氏援隱十一年莊二十九年傳例為證已得其㫖陳氏誤以左氏不書之例為筆削之法因謂左氏所記皆為魯史舊文其不見于經者悉夫子所削遂疑隠十一年傳例為後人依倣既非經㫖亦失傳意後傳之蔽在此由不知述作本原故也亦不書啖氏曰春秋紀異多矣何必為災乃書太子少黄先生曰傳見惠公在時桓公已稱太子不見公亦不書弗臨改葬不見衛侯傳因見隱攝之實公孫滑出奔衛凡賤者奔史不書魯史之法大夫非卿名氏不登于策糓梁謂之卑者公羊謂之微者公子尊與卿等公孫降於公子與微者同鄭人以王師傳見鄭為卿士私用王師史不書非王命後見五年凡王師令不及魯亦不書陳氏云隱桓以來王師皆不書非也虢師號畿内封國與王師同伐衛南鄙傳見經或不悉書凡不悉書皆以舉重見義鄭伐衛不書舉重見下年亦非公命也傳三發非公命及公子翬固請㑹師見隱攝位之初諸大夫不知稟畏非王命也陳氏曰傳釋不書使今按此亦史例公不與小歛故不書日陳氏曰傳見崩薨卒葬以日月為例非必不書日皆以公不臨喪也今按此不書日亦史例也其公實不與小歛而書日者事變不同非恤典薄也杜氏釋例論之甚詳至於崩薨卒葬亦不能推以知例陳氏於此略發其端竟亦不復深考他書盟㑹征伐等皆以日月為例乃筆削之法左氏學者所不及知說見屬辭其君臨大歛禮說見襄五年二年司空無駭入極魯司空卿官無駭公孫也以攝卿書名穀梁傳曰隱不爵大夫是也傳於魯卿每不書其官此見無駭不闕屬而未得其說故見其官以明為卿猶未敢以入國發貶例後於翬溺乃云疾之無據明矣說又見後四年孔氏曰春秋之例諸名書於經皆是卿也傳言司空故知無駭是魯卿又王制云上大夫卿則卿亦大夫也故註多以大夫言卿其名見於傳而註云大夫者則其爵眞大夫也紀子帛陳氏曰子帛裂繻字蓋杜氏意之學者遂以駮左氏誤矣三年赴以庚戌故書之說者多譏傳妄按盟㑹戰伐經書月日傳每略之不書月日者傳則詳之意在互文相備非無所據者其崩卒偽赴亦必有考借令搆虛亦不至是陳氏曰義同隱元年且見崩卒從赴後見桓五年陳侯僖七年惠王文十四年齊舍襄十九年齊侯二十八年靈王故不言葬孔氏曰此傳故上三事故下三事文不以次相配者初死即赴葬乃反哭反哭之後始袝三者依事之先後為文也至書於經則夫人與薨共文故先言不稱夫人後言不書葬順經之先後為文也薨者夫人之死號不稱夫人必不稱薨小君者夫人之别號不稱夫人必不得稱小君蓋赴祔二禮果行一事則具此三文所異者若不書葬則小君之文無所施耳今按成尊以赴同為重故赴于諸侯則稱夫人者仲子是也成喪以反哭為重故不反哭則不書葬者孟子是也聲子二事皆不行故不稱夫人亦不書葬此於史例必有所考惟祔姑則與書法無與蓋聲子仲子皆非適本不當袝非宜袝而不袝也仲子稱夫人不待袝姑則聲子不稱夫人何闗於不袝乎後世固有妾母而袝者若適母則無不袝之理定十五年定姒卒傳曰不稱夫人不赴且不袝也蓋由聲子不祔而意其或然觀此年傳例三事與書法銓配無序而仲子薨無傳豈非所考史例有未備者乎說又見定十五年為公故曰君氏君氏者攝女君之稱此特筆也說見屬辭王貳于虢洪氏曰左傳議論遣辭頗有害理者傳云王貳于虢又云王叛王孫蘇夫以君之於臣而言貳與叛晉平戎于王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國不義萇𢎞事劉文公故周與范氏趙鞅以為討夫以天子之使出聘侯國而言拜成謂周於晉為欺大國諸侯之卿䟦扈於天子而言討皆於名分為不正今按下云交質交惡並稱周鄭又云結二國之信無復君臣之辨周衰大義不明故記事者亦昧於倫理又其事或出雜書小說故語無尊卑韓宣子見魯春秋曰周禮盡在魯矣蓋以此鄭公子忽為質於周質子雖史不書此事或在春秋前又取成周之禾周四月今二月麥豈可取傳欲見平王崩鄭首畔王室故附見其事於此不計其時月之不合下言秋取禾與宣七年赤狄取向隂之禾同杜於彼知闕秋者以苗秀乃名為禾夏則無禾可取也於此乃訓秋為夏五月而取麥取禾皆以芟踐言之則以下文有八月而遷就其說也傳書時每有不異下月者有重書時以起事者其書月日亦多有不合於經者有自相牴牾者杜氏於宣二年傳注則以為傳無較例哀十二年傳注則以為傳本不以為例故不皆齊同况此無經之傳豈能無失由注文䕶短近人遂疑傳雜夏正周鄭交惡陳氏曰為桓五年王伐鄭傳後又見六年十一月昭忠信也凡傳中所引君子曰云者義皆膚淺與其序事之精如出二手蓋其序事精鑿者皆史志成文而斷論則左氏之陋見也杜註每曲為之義固不足深辨後儒併其事實一切疑之則又過矣王未葬也言未葬則求賻之由與不稱使不名之義皆見命以義夫此事當以公羊之說為正陳氏曰為桓二年宋弑殤公立馮發例嬖人之子也陳氏曰傳見州吁不稱公子按劉侍讀曰諸弑君公子而不稱公子公子之未為大夫者也其義當與齊無知同皆史例也四年衛人來告亂陳氏曰傳言所以書遇公子馮出奔鄭陳氏曰凡公子奔非其罪不書今按前言使馮出居於鄭原宣公之意而言此言出奔又自莊公忿怨言之兩通其義也圍其東門陳氏曰傳言經所以不書圍與成十七年晉圍鄭襄十年楚圍宋同義今按經言伐鄭傳言圍其東門是不成圍也當於成十七年發例五日而還陳氏曰凡還不書見莊八年襄十九年特書今按師還雖史不書以侵伐戰敗自足見義也惟襄十九年晉士匄侵齊至穀聞齊侯卒乃還為不成侵故史詳其所至書還善不伐喪非達例若莊八年書師還乃夫子改公至之文為國諱惡與史法不同宋公使來乞師陳氏曰傳見外乞師不書惟晉特書之翬帥師疾之也葉氏曰傳不明不氏及帥師之義但見翬弑君者疑其彊而自恣經直書翬帥師與後言公子翬者異其辭若貶然故妄意之今按翬與無駭溺俠稱名皆當從二傳未爵命為正左氏不知此義見翬溺不書屬而事惡皆曰疾之至桓三年翬始稱公子不得其說則曰修先君之好故曰公子由所考史法未備又不能闕疑故也取其禾而還書伐則敗之不書策書舉重衛人立晉衆也公羊傳曰稱人衆之所欲立也義同五年公將如棠觀魚者孔氏曰魚者猶言獵者今按古字魚漁通陳魚而觀之經言矢魚傳言陳魚以陳訓矢也周官􅈄人掌以時䱷䱷與魚同言陳設䱷人之事也杜註意未盡故說者皆從二傳經作觀魚朱子曰春秋征只書征伐只書伐不曾恁地下一字據傳公不射則矢魚是將弓矢去射之此說與葉氏同古者季冬命漁師始漁天子親往射魚出淮南子時則訓如此則魚為如字然傳載僖伯諫辭甚詳而但曰陳曰觀必有所據翼侯奔隨陳氏曰為莊十六年王命曲沃伯為晉侯張本見晉自獻公以前經皆不書今按獻公末年晉魯始通前是告命不行非作經時削之也衛人以燕師伐鄭上年書四國再伐鄭繼書衛人殺州吁立晉則大義已明諸侯罪惡自著故鄭衛連兵不悉書而立哀侯于翼傳見王室猶能廢置諸侯後又見莊十六年公問羽數於衆仲陳氏曰傳言經所以書初獻大夫四士二公穀皆云天子八諸公六諸侯四劉侍讀曰衆仲不知諸侯名位不同禮亦異數因天子八佾遂兼稱諸侯六佾其曰士二亦非也特牲少牢皆士禮也無用舞之處安得二佾而施之周禮舞師之職凡小祭祀則不興舞小祭祀王者服𤣥冕之祭也士服𤣥冕反舞之乎衆仲之誤無疑其說蓋主二傳汪仲裕曰樂舞之數自上而下降殺以兩諸侯既降於諸公則諸伯當降於諸侯而為二佾矣子男復何用乎禮經所記廟堂之制衮旒席數五等諸侯皆同豈以樂舞而獨異其制乎此說與劉氏異蓋主衆仲然劉氏言士無用舞之處汪氏言五等諸侯佾數不當有異皆據周禮可正三傳之失宋人取邾田陳氏曰外取田皆不書伐宋入其郛陳氏曰入郛皆不書至文十五年齊特書宋人使來告命凡微者雖接我史不書後倣此六年鄭伯侵陳陳氏曰隠桓之際侵未見於經今按下年記陳鄭交涖盟且成昏則此侵或不告凡侵人者亦未必自告陳魯無盟好告命或未通皆所當知其筆削之㫖舉重不悉書不得有二義公為之請糴於宋衛齊鄭陳氏曰傳言常事雖内不書今按京師於列國不可言告糴既實是糴不得言歸粟又不可但言告饑來者微故皆不書于策凡言饑言告糴皆非常事七年謂之禮經據經諸侯不同盟者凡五十二人不書名九人餘並書名故僖二十三年傳又曰赴以名則書之然儒者皆不信其說今推較經傳以求當時事情則未同盟而名者必姻鄰同姓諸大國也其相與者素厚則未同盟而赴以名不為卑春秋之初小國之君未同盟則不名者宿杞滕薛是也其相與者薄而得禮焉則雖小國不為簡其後無不名者不敢為異也春秋之末未同盟而赴以名後復不名者秦也秦處西戎始焉於赴告之禮猶未能詳其後以逺於我而相與者薄又得禮焉則雖不同於姻鄰諸大國亦不為簡也比事考之乃知左氏不誣但春秋之後周典散失左氏采合殘缺傅以已見略示凡例凡五十條杜氏一切定為周公所制而不考其不通於經則亦陋矣結艾之盟也傳釋列國之聘有三一結好二結盟三通嗣君今考結好而聘者則有報若莊二十五年陳女叔來聘而冬季子如陳是也結盟與通嗣君而聘者皆不報蓋禮薄與交聘異也若伯國之聘與國秦楚之窺上國而來者其事體又各不同傳皆隨事釋之蓋猶有考也宋及鄭平陳氏曰凡平不書至宣十五年始書之盟于宿凡平而後盟不書亦史例也陳五父如鄭涖盟外涖盟事淺不告八年不祀泰山也劉氏曰註云桓元年乃卒易祊田知此入祊未肯受而有之非也經云入祊者既入之矣又何未肯受而有之乎桓元年傳云鄭伯以璧假許田為周公祊故也此自傳誤隱公時鄭人歸祊者鄭自欲與隱公也桓元年以璧假許田桓公以許田與鄭眞易璧也傳乃并而言之謂鄭人以祊易許不顧隱八年已有我入祊之文今按易地之說三傳如一而穀梁傳尤詳不應其誤適同以傳證經知左氏不誤春秋書外歸邑未有書我入者經既書鄭來歸祊復書我入祊何也蓋祊逺於鄭鄭不能有而請易于魯魯人慮祊不服故以兵入焉亦如蘇忿生之田桓王不能有而後與鄭陽樊之田襄王以與晉不服而後圍之公羊傳曰言入難也糓梁傳曰入者内弗受也左氏傳例曰弗地曰入其說皆是實未能有其地也杜氏謂魯未肯受而有之固昧二傳之㫖劉氏以入祊為遂有其地由輕弗地之訓於經書入祊之義皆失之桓元年傳曰鄭人請復祀周公卒易祊田則我入祊後事嘗中輟桓公簒位而修好于鄭故復許之無可疑者近代學者率謂祊與許田是二事遂疑祀周公為左氏附益不亦過乎始作卿士于周陳氏曰傳申言鄭虢之隙㑹于溫春秋諸侯之事有不以告而史不書者有雖告而併入所重書之者凡一役再有事理亦無不告者㑹溫以瓦屋之盟為重併下事書之筆削舉重之義蓋取諸此杜氏但以為不告後人遂疑傳妄皆非也陳氏曰不書鄭鄭不成平事在十年公命以字為展氏陳氏曰傳言不書族有非必貶之者因見春秋之初大夫有卒而賜族者矣劉氏曰杜氏云無駭公子展之孫非也若無駭眞公子展之孫當其繼大宗也賜氏乆矣何待死而後賜氏乎且禮云公孫之子以王父字為氏非言其死而後氏之也然則無駭固公孫羽父請族者為無駭之子請也若公孫之子死然後賜族則無駭為終身無氏矣九年平地尺為大雪劉氏曰經有電無霖傳有霖無電傳不解經杜氏專謂經誤不亦惑乎三日之雨豈非常者若雨三日以往必書是二百四十二年三日雨者一而已陳氏曰凡例義淺今不取以王命討之伐宋傳見王命猶討不庭不書併下年鄭人以王命來告伐宋伐宋不書王命者王人不出則經無異文也北戎侵鄭春秋之初戎狄侵中國不書齊桓既伯始書之鄭人大敗戎師陳氏曰隱桓莊閔春秋凡中國敗戎狄不書至僖三十三年始書之十年盟于鄧為師期此盟與下老桃之㑹不書杜氏皆以為不告廟然公既親其事理亦無不告廟者葢既㑹而盟為師期與襄二十七年傳趙孟子皙將㑹而盟以齊言相類既盟而㑹師非復期㑹皆以中丘為重羽父先㑹齊侯鄭伯伐宋陳氏曰傳言齊侯鄭伯見君將貶書人今按一役再有事略稱人春秋初無一字褒貶之義杜氏謂君臣不當同貶稱人凡經書人而傳見是君大夫將者或以為别使微者將或以為以微者告由惑於褒貶故也公㑹齊侯鄭伯于老桃陳氏曰為下文公敗宋傳舉重不悉書今按此實史例說見前辛巳歸于我陳氏曰傳言經蔽罪于魯正之體也君子曰之陋說已見前後不復辨鄭伯入宋自宋公欲以諸侯伐鄭去馮連兵至此其報復之禍烈矣然禍首在宋而鄭實有王命故春秋誅首惡而忿兵之過不悉書討違王命也先儒頗疑此為鄭人矯假以經證經凡外入國不日而入郕書日與晉侯入曹同法經固有以别之矣十一年許莊公奔衛陳氏曰凡諸侯被兵而出者不書奔奉許叔以居許東偏陳氏曰傳言經所以書入宋不告命故不書歸祊之後魯鄭同心仇宋宋宜不告魯鄭必以告也傳不知經有舉重不悉書之義惟以史例推之故不通不書于策曰告則書曰不書于策顯發史例陳氏誤以經㫖格之故以傳例為後人依倣弑公于寪氏陳氏曰傳言經不書喪地不成喪也傳言不以君禮成喪故史不書葬陳氏謂修春秋者不成之為君誤矣定姒不書小君王子猛卒同桓公元年凡平原出水為大水陳氏曰凡例義淺今不取鄭伯拜盟陳氏曰終越盟傳言拜貺拜辱拜嘉之類非必君身親之杜説非是今案若鄭伯身來與吾君接無不書之理華父督華父字也如言弗父何公父歜與孔父嘉五世别族者不同督公孫也無賜族之法宋太宰位六卿下一命恒稱名陳氏謂隠桓莊春秋凡賊皆名之非也美而豔傳惑於小説毎類此説又見襄三十一年二年遂弑殤公葉氏曰孔父宋卿督其大夫殺卿取妻猶居位不去待君怒而始懼不近人情甚矣今案下文宋殤公立以後事覈語精已盡其罪為欲妄解書法遂贅此數語故先書弑其君傳不知以君及臣之義立華氏也言立以為卿注謂未死賜族非也莊三十二年傳立叔孫氏注云立後說者亦謂賜族然叔牙之子經書公孫玆玆之子得臣乃氏叔孫則非賜族明矣彼非賜族則此言立華氏豈賜族乎召莊公于鄭而立之陳氏曰立不書隠四年昭二十三年特書之不忘諫之以徳陳氏曰傳言桓公繼故羽父不討哀伯雖不斥言意已獨至始懼楚也陳氏曰為楚浸彊張本今案史記楚世家蚡冐弟熊通弑蚡冐而代立三十五年伐隨謂隨人曰今諸侯皆為叛相侵或相殺我有敝甲欲以觀中國之政請王室尊吾號隨人為之請尊楚王室不聽三十七年熊通怒曰吾先鬻熊文王之師也早終成王舉我先公乃以子男田令居楚蠻夷皆率服而王不加我位我自尊爾乃自立為武王楚武王二十九年魯弑隠公則伐隨在桓六年稱王在桓八年也討不敬也討不敬者魯人責其玉帛之將不備而為之辭傳固録實非所以釋經䇿勲焉禮也告廟飲至䇿勲乃反行常禮皆同時於廟中行之䇿勲即書至襄十三年春公至自晉傳曰孟獻子書勞于廟是其事也亦由告廟飲至然後書至不告廟飲至則不書至也傳于桓十六年至自伐鄭曰以飲至之禮也皆非杜氏釋不書至者以為不告廟葢本此不知書至有筆削也説又見宣五年來稱㑹成事也此魯史舊法陳氏槩以筆削求之故不取啟曲沃伐翼陳氏曰於此見傳追書之體三年故曰公子劉氏曰非修先君之好而稱公子多矣今案成十四年傳發稱族舍族例此下無以夫人至之文故别生此義可見傳例多無據四年埶芮伯以歸陳氏曰王執諸侯不書因見秦自穆公以前經皆不書今案秦自穆公以前告命不通於魯五年再赴也陳氏曰傳申言卒日月例今案此乃史氏傳疑之法亦所以避不敏趙氏疑甲戌下當記陳佗作亂事今簡脱之蓋不知經有兩下相殺不書之義文公子佗殺太子免而代之陳氏曰不書殺免凡太子未即位遇害不書王亦能軍傳見周衰天子自將以征諸侯陳氏曰不書敗績于鄭為天子諱見成元年特書之仍叔之子弱也來聘在夏釋在秋伐鄭後者由下重言秋錯誤也杜氏因謂乆留在魯過矣孔氏疑將伐鄭而遣告魯事或有之閉蟄而烝三代正朔不同故一以節氣為限過則書書以志慢亦魯史舊法考獲麟後時祭不書可見如時祭悉書于宋亦不勝書矣遂不復張氏曰州公與祭公同州必畿内之地河内州縣是也今案州公既如曹先使告魯故書明年但書寔來以此六年楚武王侵隨陳氏曰楚事始見于傳至莊十年敗蔡始見於經蓋自楚王熊達以上皆畧不書今案熊達即熊通自熊達以上楚未與魯通傳具載其伐滅小國志在兼并諸夏見中國不可無伯齊桓所以有功使魯為其班後鄭劉炫氏曰使魯為班明魯在矣見經不書陳氏曰凡諸侯交戌雖内不書七年名賤之也傳釋邾儀父書字曰貴之杞書子曰卑之故以二君書名為賤之鄧穀逺國于魯無朝事之禮與邾杞事異以賤之稱名非人情也由其初不相通隨即滅亡特名以詳之且以别於與國之來朝者八年王命虢仲立晉哀侯之弟緡于晉陳氏曰王命諸侯不書今按王室不以立緡告諸侯晉又不告立君史亦無由得書九年惟王后書孫氏葉氏陳氏皆以莊十八年傳見惠王后陳媯宣六年傳見定王后齊姜駁例與傳違按二后皆見於傳何苦自相違異蓋傳例乃魯史舊法二后非魯主昏故夫子削之特存魯主昏者以見義十年故虞公出奔共池畿内諸侯不與魯通傳博采衆籍為虞滅起本齊人以衛師助之趙氏曰魯以周班後鄭既是正禮鄭亦小恨豈至興師又經五年後方合諸侯報此小怨乎今按齊方圖紀而魯為紀歸女于天子此齊之所怒但以魯桓新昏于齊故使鄭忽以舊怨為辭耳左氏追録往事多未備亦或舍大言小不可槩斥為妄王爵也諸侯以爵序大夫各如其班魯史恒法也自非伯者無以主兵先諸侯之例傳贅杜說非十一年盟于惡曹此齊衛鄭稱人即上文戰郎諸侯也用一事再見書人例經無宋傳衍文宋亦不當叙鄭下註云經闕非祭封人仲足陳氏曰傳見祭仲足不書名則書字有非必貴之者有寵於宋莊公陳氏曰傳言宋莊公見執貶書人今按凡執恒稱人稱君者經變文也求賂焉春秋之初諸侯以貪起亂其後伯主以貪廢法其末也晉大夫以貪失諸侯傳具見其事十二年句瀆之丘燕人在㑹傳欠考後年春戰有燕人蓋黨于宋遂帥師而伐宋陳氏曰傳見公在不書鄭伯書師今按此一事再見用衆稱師之例不書公蒙上文十三年不書所戰後也杜氏曰所者期戰所在之地也孔氏曰兩敵將戰必豫期戰地紀鄭已與齊宋先設戰期公不及設期而及其戰此地非公所期故不書劉氏曰公雖不及其㑹期而及其戰期自當舉戰地何故反沒戰地乎今按㑹期輕戰期重劉氏駁之是矣傳見此年戰不書地僖二年城楚丘文七年盟于扈皆不序諸侯而不得其說俱以後至釋之至文十五年盟于扈十七年㑹于扈復不序則又别生他義傳例出於一時傳㑹明矣說並見後筆削之㫖見屬辭十四年書不害也鄭漁仲曰廟祀必十日戒享越三日而嘗則粢盛已出廩壬申致齋之初乙亥嘗非災之餘也取牛首陳氏曰傳見自桓公春秋外取邑皆不書十五年諸侯不貢車服陳氏曰按周官九貢有服貢傳未必左氏之舊今按周官雖左氏亦未嘗見考傳可知弗克而還實不成納陳氏謂不書納誤矣十六年以飲至之禮也說見前二年書時也杜氏曰下有十一月此城向亦是十一月但本事異各隨本而書之耳經書夏叔弓如滕五月葬滕成公傳云五月叔弓如滕即知稱時者未必與下月異也啖氏曰按下有十一月縱是同月亦今之九月農工未畢不可興役今按土功自戒事至畢功非止一月之事故城築皆時而不月兼春秋城築多為備敵興工得時非時本無足議傳既發不時之義於此言書時疑若美之故為後人所議又殺之陳氏曰凡殺諸子不書立公子黔牟陳氏曰不書立黔牟以朔奔為義十七年又何謁焉陳氏曰傳言得公命故書因見微者之義蔡人嘉之也蔡季不名與季子許叔同皆經變文以别於有罪者傳不知經有筆削惟以史法推之故不通陳氏曰傳釋凡歸皆譏也於是特書字因以見十五年許叔官失之也官即日官天子掌厯者言日食不書日由厯數之失致日食不在正朔故經不書日意與公榖不異後於文元年記閏三月又襄十七年記再失閏昭二十年二月記日南至哀十二年十二月云火猶西流皆見東周厯法無傳劉歆所總六厯俱非古法日官居卿以底日禮也孔氏曰周禮太史掌正歲年以序事頒告朔于邦國然則天子掌厯者謂太史也太史下大夫非卿傳言居卿則是尊之若卿弑昭公而立公子亹鄭弑君不書者魯人君突而絀忽鄭不告十八年齊人殺彭生陳氏曰殺彭生不書嫌討賊也杜氏不書非卿說非是公子書殺不必皆卿今按史既諱戕書薨則殺彭生必不後書齊人殺子亹而轘髙渠彌不書義同昭公遂與王殺周公黑肩陳氏曰不書殺周公凡天子殺大夫不書春秋左氏傳補註卷一
