body:
  text: 春秋左氏傳補註卷四元趙汸撰文公元年内史叔服孔氏曰傳稱内史叔服内史於周禮為中大夫天子大夫例書字於是閏三月非禮也孔氏曰僖五年正月辛亥朔日南至治歴者皆以彼為章首之嵗漢書律歴志云文公元年距僖五年辛亥二十九嵗是嵗閏餘十三閏當在十一月後而在三月故傳曰非禮也志之所言閏當在此年十一月後今三月巳即閏是嫌閏月大近前也杜以為僖三十年閏九月文二年閏正月故言於歴法當在僖公末年誤於今年置閏嫌置閏大近後也杜為長歴置閏疏數無復定準凡為歴者閏前之月中氣在晦閏後之月中氣在朔僖五年正月朔旦冬至則四年當閏十二月也杜長歴僖元年閏十一月五年閏十二月與常歴不同者杜以襄二十七年再失閏司歴過昭二十年二月己丑日南至哀十二年十二月螽云火猶西流司歴過則春秋之世歴法錯失所置閏月或先或後不與常同杜惟勘經傳上下日月以為長歴若日月同者則數年不置閏月若日月不同須置閏月乃同者則未滿三十二月頻置閏所以異於常歴故釋例云春秋日有頻月而食者有曠年不食者理不得一一如算以守恒數故歴無有不失也據經傳微㫖考日辰晦朔以相發明為經傳長歴未必得天蓋春秋當時之歴也歸餘於終孔氏曰歴之上元必以日月之全數為始於前更無餘分以此日為術之端首故言履端於始也朞之日三百六十有六日謂從冬至至冬至必滿此數乃周天也劉炫云一嵗為十二月猶有十一日有餘未得周也分一周之日為十二月則每月常三十日餘計月及日為一月則每月唯二十九日餘前朔後朔相去二十九日餘前氣後氣相去三十日餘每月參差氣漸不正但觀中氣所在以為此月之正取中氣以正月故言舉正於中也月朔之與月節每月剰一日有餘所有餘日歸之於終積成一月則置之為閏故言歸餘於終事則不悖孔氏曰閏後之月中氣在朔則斗柄月初巳指所建之辰閏前之月中氣在晦則斗柄月末方指所建之辰故舉月之正在於中氣則斗柄常不失其所指之次如是乃得寒暑不失其常先且居胥臣伐衛陳氏曰傳言經書晉侯杜氏從告非是今按傳言晉襄公告于諸侯而伐鄭及南陽雖中道朝王使大夫伐衛經改正之與之以繼伯也晉師圍戚陳氏曰伐國不言圍邑例在僖十八年後倣此衛孔達帥師伐晉陳氏曰傳見衛孔達書人曰成乃瞑孔氏曰禮葬乃加謚桓譚以為自縊而死其目未合尸冷乃瞑非由謚之善惡也卑讓徳之基也孔氏曰何休膏肓以為三年之喪使卿出聘於義左氏為短鄭康成箴云周禮諸侯邦交嵗相問殷相聘世相朝左氏合古禮何以難之劉氏曰左氏見當時諸侯廢喪而聘故推以為禮杜氏見左氏有得禮之言遂推以當喪而吉皆反經越禮不可以教後世今按結外援衛社稷春秋亂世之事也傳惟見此年夏葬僖公冬公孫敖如齊宣十年夏葬齊惠公冬齊侯使國佐來聘遂推以為例其言凡君亦指當時之事爾非謂周制則然以周禮邦交合左氏乃康成之失謂傳例為周公之法自杜氏之謬爾古者吉凶不相干故三年之喪不祭而何相聘問之有二年秦孟明視帥師伐晉陳氏曰傳見孟明視書師不登於明堂孔氏曰鄭𤣥以為明堂在國之陽與祖廟别處左氏舊説及賈逵盧植蔡邕服䖍等皆以祖廟與明堂為一故杜同之書不時也何氏曰禮作練主當以十三月今按僖公祥練本在元年十二月過兩月始作主以練祭後期也特書作主則祭不以時可知傳不言作練主故杜氏以過葬十月釋之然非也果如此則自虞後卒哭與祔皆無主凡几筵十月神無所依甚非人情當從何氏以厭之也傳釋處父去族諱之也此在存䇿書大體中為變例魯史無不書公行之法傳於昭公在晉晉人止公亦曰諱之知史有諱義而不知有筆削之㫖堪其事也陳氏曰傳言㑹未有書大夫者於是初書士縠今按晉司空非卿見成二年受一命之服非卿而書者列國尊伯主命春秋辭從主人見晉卑諸侯傳謂堪其事非也執孔達以説非晉執史不書逆祀也杜氏曰文公二年僖公之喪未終未應行吉禘之禮而於大廟行之其譏已明徒以躋僖而退閔故特大其事異其文定八年亦特書順祀皆所以起非常也有事于武宫及順祀傳皆稱禘則知大事有事于大廟亦禘也孔氏曰禘祭之禮諸廟已毁未毁之主皆于大祖廟中以昭穆為次序父為昭子為穆大祖東向昭南向穆北向孫從王父以次而下祭畢則復其廟其兄弟相代則昭穆同班近據春秋以來惠公與荘公當同南面西上隱桓與閔僖亦同北面西上僖是閔之庶兄繼閔而立昭穆雖同位次閔下今升在閔上故書而譏之今按魯人改祫為禘既用禘則不復用祫二傳蓋不知此義故公羊以大事為大祫榖梁以為祫嘗若魯語以為烝則與經書八月時制月不合故韋昭註謂魯文公三年喪畢之禘本左氏學者之說也其釋逆祀升僖於閔三傳初不異而昭穆之説註家不同公羊云先襧後祖榖梁云先親後祖謂僖為禰為親而閔為祖與左傳子雖齊聖不先父食語意畧同皆謂閔祖而僖禰也穀梁又云逆祀則是無昭穆無昭穆則是無祖也與魯語宗有司曰非昭穆同皆謂閔昭則僖穆也夏父弗忌曰明者為昭其次為穆何常之有是欲以僖為昭閔為穆也故韋昭釋之曰父為昭子為穆僖為閔臣臣子一例而升閔上故曰非昭穆是則傳所謂逆祀者謂顛倒其昭穆南北之位也孔氏不考外傳及公榖傳文反取何氏註謂兄弟相代昭穆同班惠公與荘公當同南面西上隱桓與閔僖當同北面西上僖是閔之庶兄繼閔而立昭穆相同位次宜在閔下則是以逆祀為升其同班上下之次而已何氏又謂僖以臣繼閔猶子繼父故閔公於文公亦猶祖也説者不詳遂以三傳昭穆父祖為引喻之辭由不知以為人後者為之子之義㫁之遂與經傳之旨相悖然何氏昭穆之説他無所據漢廟制以孝惠孝文俱為穆孝昭孝宣俱為昭何氏葢推漢事以説春秋自晉及唐宋禮官之議皆以兄弟不相為後不得為昭穆反引何氏孔氏之説以春秋躋僖公為證其所以為疑者則曰若兄弟相代昭穆即異設令兄弟四人皆立為君如商祖丁齊桓公之後則祖父之廟即已從毁後立者將不得祭矣然又慮同昭穆而並立廟則七廟五廟將不足以容於是以天子之廟而有同室異座之制有皇伯祖考之稱其説至今猶未定也竊嘗以諸侯之禮推之諸侯絶宗而兄弟不得以其屬通者所以重正綂也公子不得襧先君故别子為祖者所以尊宗廟也然公子不得宗君而為人後者得為之子不得襧先君而以為人後之義得禰所受國之君皆禮之變也兄弟本不得相為後而亦以為人後之義治之者為諸侯上必有所承下必有所授上無所承謂之簒下無所授謂之絶受人之國而絶其後是簒也故非為後則不得受國變而不失其中也既謂所受國者為襧則兄弟四人相及各襧其禰即同四世一昭一穆祖孫迭遷皆以受國為人後為重也使非受國為人後則支子自無干正綂承宗廟之理安可以後立不得祭其祖為嫌而輕受國之恩昧為後之義乎然則祖丁齊桓四子代立祭享宗廟與父子四世相承者何異使其世有適嗣亦終不免於祧安可以廟毁於子而昧其子冇貴賤本不當俱立乎後世受國與天下者遂廢為人後之禮其忘君臣之義以輕正綂亂昭穆之法以瀆宗廟皆流俗不經之論使然而其失由漢文帝始漢文自藩邸入繼大綂不後惠帝而襧髙祖其後遂以惠帝文帝共為一代則同室異座皇伯祖考之無稽皆末流所必至也若謂兄弟同班立廟將無所容則不得為昭穆之説非禮意明矣以三傳所釋相同必有所本而註家自汨亂之使議禮者失其所依故不可無辨猶上祖也孔氏曰宋為王者之後得祀殷之先王帝乙之廟不毁者葢以為其所出故特存焉周制王子有功徳出封者得廟祀所出之王魯以周公故得立文王之廟襄十二年傳稱魯為諸姬臨於周廟周廟文王廟也鄭之桓武世有大功故得立厲王之廟昭十八年傳稱鄭人救火使祝史徙主祏於周廟周廟厲王廟是也今按傳言宋祖帝乙與言鄭祖厲王同葢自微子桓公不先父食言之王者之後雖曰得祀先王其廟祭之禮今不可考或謂宋當祖湯疑傳妄則又全類王者故孔氏惟以不毁之廟釋之魯鄭所出王廟乃東遷後僣禮事與宋祀帝乙不同傳並舉宋鄭已非孔氏遂謂魯鄭有周制則㡬於誣矣凡傳所言春秋時越法變禮皆指為周制乃左氏學者之通弊謂之崇徳趙伯循曰聖人不以秦穆悔過而卑中國陳氏曰大夫將猶稱人也自陽處父專將書大夫今按書存秦誓如詩錄秦風與修春秋事體不同左氏尊秦葢當時流俗之論唯後傳於此妙得經㫖禮之始也范寗曰喪制未畢而納幣非禮也葉氏曰僖公薨以十二月杜氏以為月誤當為十一月今以冬納幣審十二月猶在􅎭則納采在三年之内矣反為禮乎諸侯娶元妃固有時而左氏以即位為節尤見其妄三年在上曰逃陳氏曰例辭粗淺今不取來赴弔如同盟禮也孔氏曰謚之為文必當有爵不書爵者畿内之國不得外交諸侯其臣不敢赴魯必天子為之赴赴以王子為親不復言其爵也陳氏曰傳稱同盟謂同方岳之盟故於滕杞薛發傳傳其微者也他非同盟來赴錄之故於王子虎發傳傳其著者也今按傳言同盟指當時諸侯㑹盟而言王子虎踐土翟泉實盟諸侯故赴弔用諸侯同盟例秦伯伐晉陳氏曰傳見秦伯書人子桑有焉此亦以成敗論人春秋正誼不謀利明道不計功左氏不足以知此秦穆修怨乃中國之罪人説見屬辭晉先僕伐楚以救江陳氏曰併入下文書且見先僕非卿帥師不書他放此今按將卑書人師衆書師史之恒法伐楚以救江經書陽處父帥師為大夫將書大夫之始不以救江累王室故沒王叔不書且明征伐在大夫譏不及王叔也杜陳説皆非孔氏曰王叔文公不知何王之子字叔遂以叔為氏桓公是其子王叔陳生是其後也衛有公叔文子此人蓋以王叔為氏也四年故免之陳氏曰終元年伐晉傳過數孔氏曰哀十年傳稱齊人弑悼公赴於師吳子三日哭于軍門之外鄰國之數蓋三日也五年來㑹𦵏禮也何休膏肓以為禮尊不含卑又不兼二禮左氏以為禮於義為短鄭康成箴云禮天子於二王後之喪含為先襚次之賵次之賻次之於諸侯含之賵之小君亦如之於諸侯臣襚之諸侯相於如天子於二王後於卿大夫如天子於諸侯於士如天子於諸侯臣何休云尊不含卑非經意其一人兼歸二禮亦是為譏孔氏曰按禮雜記諸侯相弔之禮含襚賵臨同日而畢與介代有事焉不言遣異使也康成以為譏一人兼二事者非左氏意杜氏曰凡妾子為君其母猶為夫人雖先君不命其母母以子貴其適夫人薨則尊得加於臣子内外之禮皆如夫人矣故姒氏之喪責以小君不成成風之喪王使㑹葬傳曰禮也劉氏曰庶子為君為其母無服不敢貳尊者也妾母稱夫人王不能正而又使公卿㑹何禮之有今按王室成諸侯妾母之喪歸賵含㑹葬經於王皆不稱天以示譏與錫桓公命同而三傳皆不能辨左氏反以為禮杜氏釋例又以母以子貴之義傅㑹為几何氏知不稱天為刺失禮矣而其所謂失者惟以至尊行卑事為譏則以母以子貴之説實出於公羊故也劉侍讀以喪服義駮之當矣楚成大心仲歸陳氏曰傳見成大心書人例在僖二十六年滅蓼蓼六之别封不書併滅六哀哉傳於文五年錄臧文仲語成七年錄季文子語昭十六年錄叔孫昭子語皆見中國無伯而識者憂之六年以為常法孔氏曰周官大師大傅大保天子三公也宣十六年傳晉侯請于王命士㑹将中軍且為大傅則大傅尊於中軍之将與大師皆為孤卿也周禮上公之國有孤一人王制諸侯三卿晉侯爵也而有三軍六卿復有孤二人者晉為伯主多置羣官共時所須不能如禮孤尊於卿法由在上故宣子法成授二孤使行之秦伯任好卒傳見秦卒葬猶未見於經難必抒矣服䖍作紓紓緩也班在九人九等之班乃諸侯取女立子通制隱元年公羊傳何氏註曰禮適夫人無子立右媵右媵無子立左媵左媵無子立適姪娣適姪娣無子立右媵姪娣右媵姪娣無子立左媵姪娣是時諸侯取女立子雖不如禮而九等班位尚存故趙孟得而言之與公羊立子以貴不以長之説合後世論公子爭國者惟欲以年之長少定之宜不合於經也讓偪姞而上之孔氏曰譜以偪為國名地闕不知所在侵官也晉殺處父莒殺意恢據傳皆兩下相殺也左氏不知有筆削之旨義與事違晉殺續簡伯非卿不告後倣此七年非禮也陳氏曰傳言所以再書取須句昭公將去羣公子傳錄此語不言其故且昭公未即位而先欲去羣公子殊不近人情或是當時交搆之言或弑君者誣之以證成其無道耳史記宋世家成公卒其弟禦殺世子而自立國人殺禦而立其少子杵臼是為昭公此蓋國亂之由傳偶不能備史亦不復詳也殺公孫固公孫鄭于公宫孔氏曰經書宋人殺其大夫則此二子名氏當見於經亦卿官也僖二十二年傳稱大司馬固於是又有司馬子魚上文樂豫為司馬下云六卿和公室六卿之外冇此二子蓋是孤卿之官也宋是上公禮得有孤且春秋時不必如禮今按宋有司馬為卿又有大司馬者僣王朝夏官之制也陳氏曰固大司馬也見僖二十二年傳言穆襄之族率國人殺固鄭故書宋人且言非其罪也陳氏曰傳釋大夫恒書名於是特不書名且釋不以國討為文今按不稱名説見後八年秦康公陳氏曰傳見秦康公書人趙盾将中軍陳氏曰傳見晉趙盾書人先蔑将下軍上言先蔑如秦又言背先蔑以禦秦師則将下軍非先蔑傳誤明矣杜氏先蔑前還亦非既前還背秦無用奔秦其奔秦以不與立靈公爾敗秦師于令狐不言敗經變文盟于扈陳氏曰傳言諸侯不敘今按晉襄卒靈公幼趙盾以大夫主諸侯卒使晉不競於楚中國於是無伯故經變文以畧之下又見十五年十七年公後至故不書所㑹劉氏曰公後至不書所㑹非也按經與公盟矣何謂後㑹乎又稱公㑹諸侯矣豈不及其㑹者乎杜云公後其㑹而及其盟此飾非之言㑹盟同地㑹所以為盟也今及其盟不得云後㑹且盟重㑹輕不當責其輕辟不敏也傳見公在不序諸侯遂通桓十三年公㑹戰不書所戰為例使公誠後至諸侯固公所期經既書公㑹諸侯亦不得云不書所㑹至十五年公實不㑹亦不序諸侯始發他義凡例無據明矣陳氏曰凡例併十五年凡例後人妄加之諸侯㑹公不與豈得為君惡乎八年自申至于虎牢之境陳氏曰終元年疆戚田傳且言晉利諸侯之地以報令狐之役陳氏曰自是秦晉再交兵不書故十年書秦伐晉晉人以扈之盟來討傳發公後至例以此珍之也葉氏曰遂本以二事出故以壬午盟趙盾己酉盟雒戎相去四日非一事再見自不應去族何珍之云使經與其遂事則當書遂與雒戎盟于暴亦不得再見名氏經不言遂而傳言遂其妄可知今按襄仲是行一盟中國一盟夷狄既不得用一事再見之例亦不當言遂杜云遂不受命而盟雒戎非事實也故書以官陳氏曰傳見卭不書名氏且言襄夫人因戴族以殺卭故亦書人皆貴之也陳氏曰傳釋凡奔皆譏也於是特書官劉氏曰握節而死亦大臣常事效節而出自求免罪而己未見可貴之實趙伯循曰大夫二卿之死此殺昭公之漸也四人皆忠於公而左氏謂之黨何謬耶按周官唯守邦國都鄙及出使有節六卿居官者未聞其有節也宋有六卿以王者後即周制也司馬司城何節之云啖氏曰傳言此二人不失節致誤節義為符節如孔父義形於色而誤為女色也今按左氏不知宋大夫不名而書官乃夫子特筆見書司城則曰以其官逆之見書司馬則曰其官皆從不能闕疑而妄釋書法故其陋至此九年使賊殺先克陳氏曰殺先克不書非君命二傳所謂兩下相殺也晉人殺先都梁益耳傳見討亂稱人未葬也劉氏曰諸侯逾年尚稱公王者逾年反不稱王乎毛伯求金非王命可知也書顧命曰伯相命士須材此則冡宰當國之文矣今按諸侯逾年稱公為不可曠年無君臣子辭也至於發號出令猶聽於冡宰三年白虎通義曰不曠年無君故逾年乃即位改元以紀事而未發號令也三年除喪乃即位踐阼為主南面朝臣下稱王以發號令也其説於周制得之左氏言既葬稱君考之不詳也又見屬辭晉人殺箕鄭父士縠蒯得孔氏曰士縠書經則是卿也七年令狐之戰三軍将佐無士縠十二年河曲之戰三軍将佐杜註無代士縠者而士縠得為卿者先蔑奔秦傳無其代十二年欒盾将下軍註云代先蔑者據傳成文言之耳未必不是士縠代先蔑欒盾代士縠也箕鄭上軍将也傳箕鄭先士縠經士縠先箕鄭者經以殺之先後傳以位次序列傳蒯得居下知其以位次也或者晉於将佐之外别有散位從卿若郤缺趙穿之類楚子師于狼淵以伐鄭陳氏曰傳見楚子書人以懲不恪葉氏曰比事觀之計諸國之救在一月之内未為後時設楚人聞五國來救而退亦豈可以不及楚師罪之陳氏曰傳釋晉嘗稱大夫於是特稱人且為晉失諸侯之漸今按傳意不及此陳氏所得由傳入每欲通傳於經楚公子朱自東夷伐陳陳氏曰併前役不書陳人敗之陳氏曰外敗不書例在隱四年後倣此獲公子茷例在僖三十三年後倣此楚子越椒未賜族稱名與中國諸侯大夫同以無忘舊好孔氏曰僖公成風服除乆矣今始來弔贈當以變禮待之何休膏肓云於禮既緩而左氏以為禮非也鄭箴云若以為緩按禮衛將軍文子之喪既除喪而越人來弔子游何得善之是古有以服終來弔者也十年取北徴陳氏曰傳見秦伯書國殺鬭宜申陳氏曰傳見鬭宜申不書族遂及蔡侯次于厥貉陳氏曰息㑹不書未驟以諸侯予楚也於是蔡實從楚故但書厥貉之次後見宣元年杜説非是今按十四年新城之盟陳鄭皆在而蔡獨不與其㑹于息矯情紓急與宋同爾故息㑹削不書而厥貉書蔡侯此筆削之權衡也春秋亦無予楚以伯之義杜氏固非是陳氏尤失之麇子逃歸陳氏曰凡逃夷狄不書今按麇屬楚小國雖逃史不書十一年成大心敗麇師於防渚不書敗説在隱四年即位而來見也傳見諸侯喪畢不朝京師而朝大國且言司城蕩意諸而復之陳氏曰凡大夫奔復之皆不書杜説非是遂伐我伐我不書以敗之為義獲長狄僑如下言椿其喉以戈殺之則其人之長六尺之戈所可及也註長三丈乃據魯語與榖梁傳而意之不能闕所不知若何休以為葢長百尺則怪誕矣以命宣伯名其三子事見襄三十年鄋瞞由是遂亡劉氏曰經言狄不言長安知是長狄赤狄白狄姜戎山戎陸渾戎春秋書之未嘗畧至於長狄何獨不書傳曰鄋瞞由是遂亡杜云長狄之種絶外傳仲尼對吳使者曰長狄氏今曰大人則孔子時長狄更為大人不得言絶吕氏曰記敗狄于鹹于瞞侵齊之下非長狄明矣今按傳記長狄事甚異而此侵齊者乃為鄋瞞而鄋瞞舉國皆長人則當書長狄以别之今經但書狄則鄋瞞非長人可知然得臣獲僑如以名其子亦不可謂無其事據傳曰鄋瞞曰狄曰長狄製言有法蓋鄋瞞者狄國名而長狄自為一種服屬於鄋瞞者是時為鄋瞞驅以侵齊魯適為得臣所獲於法自不得書杜氏誤謂鄋瞞是長狄國名僑如為其國之君故説者因得以不書長狄排左氏為妄十二年尊諸侯也陳氏曰傳釋書法與邾庶其三叛臣異今按此史文也左氏既不能别白學者又不知有辭從主人之義遂詆傳為妄過矣始朝公也孔氏曰劉炫云魯公新立鄰國及時來朝則曰公即位而來朝晚則云始朝公也諸侯自新立來及時者則云即位而來見晩則云始見伯主即位魯君往朝則曰朝嗣君魯君新立往朝大國則曰即位而徃見也公許之孔氏曰成五年有把叔姬來歸故知立其娣為夫人也釋例曰把桓公以僖二十三年即位襄六年卒凡在位七十一年文成之世經書叔姬二人一人卒一人出皆把桓公夫人也今按陳氏云復求其次不近人情不言把絶也説者疑把絶叔姬非此子叔姬以前不書來歸傳又無子字卒不繫把杜氏謂未歸而卒則亦不當遽絶之遂排傳妄非也蓋叔姬不安於把假歸寜以反故把伯來請而後絶經不書始嫁與來寧法與鄫季姬同卒不繫把者既絶也經稱子叔姬者孔氏曰周人字法積叔故或加子以自異是也傳不稱子亦省其可省者或時俗通稱也言非女也孔氏曰喪服女子既嫁而反在父母之室從本服為之齊衰期此既書其卒當服其本服杜譜不知此叔姬是何公之女要姑與姊妹皆服期也遂圍巢孔氏曰世本偃姓舒庸舒蓼舒鳩舒龍舒鮑舒龔以其非一故言屬以包之秦伯使西乞術來聘劉氏曰杜氏云術不稱氏史畧文非也内大夫未賜族者猶不氏安知此術非未賜族者乎寡君敢辭玉聘義曰以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也然則聘禮終必還玉非不欲與秦為好也傳錄賓主辭令以見秦人之進於禮下云國無陋矣是也杜説非趙盾將中軍陳氏曰傳言秦伯晉趙盾見書人交綏孔氏曰司馬法云将軍死綏舊説綏却也言軍却将當死綏必是退軍之名明日請相見也孔氏曰憗者缺之貌今人猶謂缺為憗也沈氏云方言云憗傷傷即缺也十三年以守桃林之塞孔氏曰桃林之塞在南河之南逺處晉之南境從秦適周乃由此路使詹嘉守此塞者以秦與東方諸侯逺結恩好及西乞聘魯亦應更交餘國慮其要結外援東西圖已故使守此阨塞欲㫁其徃來故也六卿相見於諸浮孔氏曰六卿在朝旦夕聚集而特云相見於諸浮者将欲密謀慮其漏泄故出就外野屏人私議諸浮當是城外之近地其處者為劉氏陶唐氏之後為劉累累後為晉范氏士氏見襄二十四年昭二十九年傳及晉語邾文公卜遷于繹陳氏曰凡自遷其國都不書亦請平于晉陳氏曰傳見諸侯猶有尊晉之志十四年故不赴頃王崩葬不書説見荘十六年傳知史有不赴不書之例遂援王孫爭政事以實之非也晉趙盾陳氏曰傳言趙盾見書人納捷菑于邾陳氏曰傳於齊紏小白陽生邾捷菑莒去疾皆見不書奔譏不在奔故遂殺鬭克及公子燮楚殺大夫或不告與中國異後倣此貴之也失與釋司馬司城書官同此獨書字則又誣以不義其君十五年宋華耦來盟陳氏曰傳言華耦不書名貴之也葉氏曰諸侯相聘使介有常不聞其官皆從也以此為貴豈春秋之意哉今按華孫者公子鮑之黨來盟蓋結魯以輔簒不稱使不名者非時君所使無所受命從史文也書官者夫子特筆使與八年書官者相首尾以異其事左氏於筆削之旨無傳惟榖梁傳曰以其官稱無君之辭也明宋大夫之見殺者來奔者來盟者皆宋人無君之事蓋此經逸義也而為其學者不能發明亞旅孔氏曰尚書牧誓司徒司馬司空亞旅成二年傳魯賜晉三帥三命之服候正亞旅受一命之服皆卿後即次亞旅知是上大夫也古之制也劉氏曰尚書周官六年五服一朝不得於諸侯亦五年一朝也大行人職曰凡諸侯邦交嵗相問殷相聘世相朝此為得中今按曹伯文十一年來朝至十五年再來偶合五年之數傳遂以為古制由不見周禮耳卞人以告孔氏曰治邑大夫例呼為人孔子父為鄹邑大夫謂之鄹人知此卞人是卞邑大夫親之道也孔氏曰祭敬者謂助祭於兄弟之家盡其敬也喪哀者謂兄弟死喪之事竭其哀也情雖不同謂内相怨恨不能和同當無絶其愛是相親之道也貴之也陳氏曰傳釋外大夫未有書至者於是特書至説見後傳今按此史例也傳於史文有未詳輙妄釋之蓋於魯史舊章亦考之未備獲大城焉曰入之陳氏曰按襄十三年取邿之傳曰凡書取言易也用大師焉曰滅弗地曰入陸氏纂例辨之矣今不取無能為故也陳氏曰傳釋盟恒序諸侯於是雖伯主在焉亦不序見晉失伯而楚興與而不書後也説見七年十六年及齊平陳氏曰凡平雖内不書疾也趙伯循曰十二公除文公外餘未當書不視朔豈皆無疾今按公疾不視朔必書史所以謹君疾重國政雖託疾亦書史無訐君以為直之義傳釋公四不視朔曰疾也乃據史法言之然經既削其真有疾者則此為託疾亦可知矣左氏知史而不知經後儒又不思經本出於史此筆削之義所以失傳所以服陘隰也孔氏曰劉炫云按楚世家蚡冐卒弟熊達殺蚡冒子而代立是為楚武王則蚡冒是兄不得為父今知不然者以世家之文多有紕繆與經傳異者非是一條杜氏非不見其文但見而不用耳劉以世家而規杜非也言服陘隰則陘隰本是他國蚡冒始服之也釋例陘隰與僖四年次于陘為一地潁川召陵縣南有陘亭楚自武王始居江漢之間則蚡冒之時未至中土不應已能越申息逺服潁川之邑疑非也羣蠻從楚子盟陳氏曰傳見楚子書人夫人使謂司城去公傳序六卿於上而夫人但使司城去公則餘五人者皆鮑之黨也且知謀者也使帥甸攻而殺之不書甸兵攻而殺之者時告辭略但以弑君赴也蕩意諸死之意諸來奔而請復無能為輕重雖死節不書嫌與苟息仇牧比君無道也劉氏口如傳所説則公子鮑為不臣襄夫人為不母而昭公未有無道之實也傳曰君雖不君臣不可以不臣不得輕此兩人之罪反專惡宋公王申子曰君父天也豈臣子較得失之地乎今按明年四國伐宋傳記晉人討罪之辭而譏其猶立文公晉語記趙宣子請師於靈公以伐宋曰宋人弑其君晉為盟主而不修天罰将懼及焉公許之必有據矣獨於昭公見弑始終加以無道與所序之事自相反何也當時列國皆政出大夫其士民知有大夫而不知有君謂晉趙盾弑君為良大夫而宋昭公見弑為無道皆弑君者子孫設辭以分惡殺恥左氏不能辨遂援以釋經且立以為例後見宣四年襄三十一年蕩虺為司馬傳見惟殺蕩意諸右師以下皆在位十七年失其所也陳氏曰傳釋四國之大夫書人不予以討賊之義晉自是凡三大舉皆書人見宣元年二年十年今按襄二十五年夷儀之㑹晉受賂不討齊弑君者而經序諸侯無異文劉氏諸儒因以駮傳卿失所稱人為非考之於經凡諸侯盟㑹皆從其恒稱義與大夫不同不得以彼證此無功也陳氏曰傳釋㑹恒序諸侯於是雖伯主在焉亦不序相及於絳孔氏曰歸生對晉稱己君當云寡君之二三臣此言孤者蓋鄭伯身自對晉或自稱孤歸生因即以孤言其君也趙穿公壻池為質焉陳氏曰傳言晉之不競乘其飲酒也陳氏曰為成元年王師敗起傳十八年乃謀弑懿公稱人從赴例在十六年杜陳説皆非諱之也傳見惡不書弑杜陳説皆非既葬未踰年不稱君當以公羊為正劉氏曰杜云先君既葬不稱君者魯人諱弑以未成君書之非也假令不諱遂書公薨乎一年不二君之義何所施此乃明稱君者之不以葬為限果矣僕因國人以弑紀公陳氏曰傳言僕弑紀公而書國宋公弑母弟須及昭公子陳氏曰討亂雖殺母弟不書以靖國人孔氏曰世本云戴公生樂甫術術生碩甫澤澤生夷甫須須生大司冦吕今云曽孫誤也春秋左氏傳補註卷四
